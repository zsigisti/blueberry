{% extends "base.html" %}
{% block title %}Log in · Blueberry Recipe Hub{% endblock %}
{% block body %}
<div class="panel" style="max-width:420px">
  <h2 style="margin-top:0">Log in</h2>
  <form method="post">
    <label>Username</label><input type="text" name="username" autofocus>
    <label>Password</label><input type="password" name="password">
    <p><button class="btn" type="submit">Log in</button></p>
  </form>
  <p class="muted">No account? <a href="{{ url_for('register') }}">Register</a>.</p>
</div>
{% endblock %}
