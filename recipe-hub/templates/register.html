{% extends "base.html" %}
{% block title %}Register · Blueberry Recipe Hub{% endblock %}
{% block body %}
<div class="panel" style="max-width:420px">
  <h2 style="margin-top:0">Register</h2>
  <form method="post">
    <label>Username</label><input type="text" name="username" autofocus>
    <label>Password <span class="muted">(min 8 chars)</span></label><input type="password" name="password">
    <p><button class="btn" type="submit">Create account</button></p>
  </form>
  <p class="muted">The first account created becomes the admin.</p>
</div>
{% endblock %}
