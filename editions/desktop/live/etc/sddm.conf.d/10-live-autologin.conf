# 10-live.conf — live SDDM session config.
# NOTE: autologin into the Plasma session is disabled for now — the session's
# kwin_wayland cannot acquire DRM master from logind on the live seat
# ("Failed to open drm node"), so startplasma-wayland exits and SDDM cycled to a
# black screen. The GREETER compositor renders fine (direct /dev/dri via the
# video/render groups), so we show a stable Wayland greeter; log in as "live"
# (no password). Re-enable [Autologin] once the logind seat→DRM hand-off works.
#
# @@LIVE_SESSION@@ is substituted by tools/mkdesktopiso.sh (kde -> plasma).

[General]
# Wayland only: this image ships no Xorg, so force the Wayland greeter.
DisplayServer=wayland

[Wayland]
# SDDM's default greeter compositor is weston, which we don't ship. Drive the
# greeter with kwin_wayland (in the closure); software GL via the env below.
CompositorCommand=kwin_wayland --no-lockscreen --no-global-shortcuts --locale1
EnableHiDPI=true
