# 10-live-autologin.conf — auto-log the live session straight into Plasma.
# @@LIVE_SESSION@@ → plasma (kde), substituted by tools/mkdesktopiso.sh.
#
# The session is started via SDDM's wayland-session script (#!/bin/sh); the
# systemd base ships no busybox sh, so without /bin/sh→bash the script could not
# exec and startplasma-wayland exited 2 → SDDM cycled. With /bin/sh provided
# (bash package + ISO builders) the session compositor starts normally.
[Autologin]
User=live
Session=@@LIVE_SESSION@@.desktop
Relogin=false

[General]
# Wayland only: this image ships no Xorg, so force the Wayland greeter/session.
DisplayServer=wayland

[Wayland]
# SDDM's default greeter compositor is weston, which we don't ship. Drive the
# greeter with kwin_wayland (in the closure); software GL via the live env.
CompositorCommand=kwin_wayland --no-lockscreen --no-global-shortcuts --locale1
EnableHiDPI=true
