# 10-live-autologin.conf — auto-log the live session into the desktop.
# @@LIVE_SESSION@@ is substituted by tools/mkdesktopiso.sh:
#   KDE   -> plasma   (Wayland session, /usr/share/wayland-sessions/plasma.desktop)
#   GNOME -> gnome
[Autologin]
User=live
Session=@@LIVE_SESSION@@.desktop
Relogin=false

[General]
# Wayland only: this image ships no Xorg, so the X11 greeter path aborts
# (no /usr/bin/X → xauth failure). Force the Wayland greeter + session.
DisplayServer=wayland
GreeterEnvironment=QT_WAYLAND_SHELL_INTEGRATION=layer-shell,LANG=C.UTF-8,LC_ALL=C.UTF-8

[Wayland]
# SDDM's default greeter compositor is weston, which we don't ship. Drive the
# greeter with kwin_wayland (already in the closure).
CompositorCommand=kwin_wayland --no-lockscreen --no-global-shortcuts --locale1
EnableHiDPI=true
