# 10-live.conf — live SDDM session config.
# Autologin the live user straight into the Plasma Wayland session. Software GL
# (kms_swrast/llvmpipe) reaches both the greeter (greeter wrapper) and the
# session (pam_env /etc/environment). @@LIVE_SESSION@@ → plasma (kde).
[Autologin]
User=live
Session=@@LIVE_SESSION@@.desktop
Relogin=false

[General]
# Wayland only: this image ships no Xorg, so force the Wayland greeter + session.
DisplayServer=wayland

[Wayland]
# SDDM's default greeter compositor is weston, which we don't ship. Drive the
# greeter with kwin_wayland (in the closure); software GL via the greeter wrapper
# + /etc/environment (kms_swrast / llvmpipe).
CompositorCommand=kwin_wayland --no-lockscreen --no-global-shortcuts --locale1
EnableHiDPI=true
