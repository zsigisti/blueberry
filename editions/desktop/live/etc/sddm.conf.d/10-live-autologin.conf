# 10-live-autologin.conf — auto-log the live session into the desktop.
# @@LIVE_SESSION@@ is substituted by tools/mkdesktopiso.sh:
#   KDE   -> plasma   (Wayland session)
#   GNOME -> gnome
[Autologin]
User=live
Session=@@LIVE_SESSION@@
Relogin=false

[General]
# Wayland greeter; falls back to X if the compositor can't start.
DisplayServer=wayland
