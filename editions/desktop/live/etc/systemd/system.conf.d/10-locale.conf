# Force a UTF-8 locale for EVERY service systemd (PID 1) spawns — including
# sddm.service and the greeter/compositor it forks. glibc 2.43 ships en_US.UTF-8
# built in, so no locale-archive is needed. This is the reliable propagation
# path: pam_env/locale.conf weren't reaching the SDDM greeter (it kept detecting
# "C"/ANSI), making Qt warn and degrading text shaping.
[Manager]
DefaultEnvironment=LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8 LANGUAGE=C
