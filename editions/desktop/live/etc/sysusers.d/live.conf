# live.conf — create the unprivileged 'live' user for the live session.
# Consumed by systemd-sysusers at boot (the live squashfs is read-only; the
# account materialises into the tmpfs overlay's /etc).
u live 1000 "Blueberry Live" /home/live /bin/bash
m live wheel
m live video
m live audio
m live input
m live render
# The SDDM greeter compositor (kwin_wayland) runs as 'sddm'; give it direct DRM
# access (video/render) so it can open /dev/dri/card0 even if the logind seat
# device hand-off is unavailable.
m sddm video
m sddm render
m sddm input
