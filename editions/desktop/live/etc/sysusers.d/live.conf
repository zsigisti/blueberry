# live.conf — create the unprivileged 'live' user for the live session.
# Consumed by systemd-sysusers at boot (the live squashfs is read-only; the
# account materialises into the tmpfs overlay's /etc).
u live 1000 "Blueberry Live" /home/live /bin/bash
m live wheel
m live video
m live audio
m live input
