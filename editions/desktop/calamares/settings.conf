# settings.conf — Calamares install sequence for Blueberry Desktop.
# Installed to /etc/calamares/settings.conf in the live ISO.
#
# The live image ships the full desktop as a squashfs; install = copy that
# squashfs to disk (unpackfs) + configure the target. No online package fetch.
---
modules-search: [ local ]

instances:
- id:     blueberry
  module: displaymanager
  config: displaymanager.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - bootloader
  - umount
- show:
  - finished

branding: blueberry

# Don't let the user cancel mid-write once partitioning starts.
prompt-install: true
dont-chroot:    false
oem-setup:      false
disable-cancel-during-exec: true
