# displaymanager.conf — which greeter the installed system boots into.
# @@DEFAULT_DM@@ is substituted by tools/mkdesktopiso.sh (sddm for the KDE spin,
# gdm for the GNOME spin). SDDM is shipped in both, so it is the fallback.
---
displaymanagers:
    - "@@DEFAULT_DM@@"
    - sddm
basicSetup:     false
sysconfigSetup: false
