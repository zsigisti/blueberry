# welcome.conf — first page + system requirements gate.
---
showSupportUrl:      true
showKnownIssuesUrl:  false
showReleaseNotesUrl: true
requirements:
    requiredStorage:    8.0
    requiredRam:        1.8
    # No internetCheckUrl: the install is fully offline (squashfs → disk), and the
    # SSL probe segfaulted Calamares on a network-less boot. Don't check internet.
    check:
        - storage
        - ram
        - power
        - root
    required:
        - storage
        - ram
        - root
