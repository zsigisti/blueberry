# services-systemd.conf — units to enable on the installed target.
# @@DEFAULT_DM@@ is substituted by tools/mkdesktopiso.sh (sddm | gdm).
---
units:
    - name: "@@DEFAULT_DM@@.service"
      action: enable
      mandatory: true
    - name: NetworkManager.service
      action: enable
      mandatory: true
    - name: bluetooth.service
      action: enable
      mandatory: false
    - name: cups.service
      action: enable
      mandatory: false
    - name: systemd-timesyncd.service
      action: enable
      mandatory: false
