# bootloader.conf — GRUB on the target (BIOS + UEFI), matching the base distro.
---
efiBootLoader: "grub"
kernel:        "/boot/vmlinuz"
img:           "/boot/initramfs.cpio.zst"
kernelSearchPath: "/boot"
kernelLine:    ", with Blueberry"
grubInstall:   "grub-install"
grubMkconfig:  "grub-mkconfig"
grubCfg:       "/boot/grub/grub.cfg"
efiBootloaderId: "Blueberry"
installEFIFallback: true
