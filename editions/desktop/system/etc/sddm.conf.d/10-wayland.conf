# Blueberry Desktop — SDDM configuration for the installed system.
# Wayland only: no Xorg is shipped, so force the Wayland greeter + session, and
# drive the greeter with kwin_wayland (SDDM's default is weston, not shipped).
[General]
DisplayServer=wayland

[Wayland]
CompositorCommand=kwin_wayland --no-lockscreen --no-global-shortcuts --locale1
EnableHiDPI=true
