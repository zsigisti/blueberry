# Live/VM systems often have a KMS device with no native Mesa GBM driver
# (QEMU virtio-gpu without virgl, bochs, generic simpledrm). Force Mesa's
# software path so libgbm falls back to kms_swrast and KWin's DRM backend can
# create a GBM/EGL context; KWIN_DRM_USE_QPAINTER is the belt-and-suspenders
# software-compositing fallback. Inherited by the SDDM greeter compositor and
# the autologin session that SDDM spawns.
[Service]
Environment=LIBGL_ALWAYS_SOFTWARE=1
Environment=KWIN_DRM_USE_QPAINTER=1
Environment=GALLIUM_DRIVER=llvmpipe
Environment=LANG=en_US.UTF-8
Environment=LC_ALL=en_US.UTF-8
