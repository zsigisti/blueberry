[package]
name     = "gnutls"
version  = "3.8.13"
# release 2: rebuilt against nettle 4.0 (libnettle.so.8→.so.9, libhogweed.so.6
# →.so.7). gnutls's own soname (libgnutls.so.30) is unchanged, so gnupg/msmtp
# are unaffected; this rebuild just keeps the repo's nettle/gnutls pair matched.
release  = 2
summary  = "Secure communications library implementing SSL, TLS and DTLS"
homepage = "https://www.gnutls.org/"
license  = ["LGPL-2.1-or-later", "GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "nettle", "libtasn1", "p11-kit", "libunistring", "gmp", "libidn2", "zlib"]
makedepends = ["pkgconf", "nettle", "libtasn1", "p11-kit", "libunistring", "gmp", "libidn2"]
provides    = ["libgnutls.so", "libgnutlsxx.so", "libgnutls-dane.so"]

[[source]]
url    = "https://www.gnupg.org/ftp/gcrypt/gnutls/v3.8/gnutls-3.8.13.tar.xz"
sha256 = "ffed8ec1bf09c2426d4f14aae377de4753b53e537d685e604e99a8b16ca9c97e"

[steps]
build = '''
cd "$name-$version"
./configure --prefix=/usr --disable-static \
  --with-included-unistring=no --without-tpm --disable-guile \
  --disable-doc --disable-tests --disable-full-test-suite \
  --disable-hardware-acceleration
make
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
'''
