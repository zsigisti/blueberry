[package]
name     = "pam"
version  = "1.7.0"
release  = 1
summary  = "Pluggable Authentication Modules library"
homepage = "https://github.com/linux-pam/linux-pam"
license  = ["BSD-3-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "gdbm"]
makedepends = ["meson", "ninja", "flex", "bison"]
provides    = ["libpam.so", "libpamc.so", "libpam_misc.so"]

[[source]]
url    = "https://github.com/linux-pam/linux-pam/releases/download/v1.7.0/Linux-PAM-1.7.0.tar.xz"
sha256 = "57dcd7a6b966ecd5bbd95e1d11173734691e16b68692fa59661cdae9b13b1697"

[steps]
build = '''
arch-meson "Linux-PAM-$version" build -D docs=disabled -D selinux=disabled -D nis=disabled -D audit=disabled -D db=gdbm -D econf=disabled;
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir";
install -Dm644 "Linux-PAM-$version/COPYING" "$pkgdir/usr/share/licenses/$name/COPYING"
'''
