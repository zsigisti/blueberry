[package]
name     = "qt6-declarative"
version  = "6.11.1"
release  = 1
summary  = "Qt 6 QML and Quick: the declarative UI engine behind Plasma and SDDM greeters"
homepage = "https://www.qt.io/"
license  = ["LGPL-3.0-only"]
arch     = ["x86_64"]

depends     = ["qt6-base", "qt6-shadertools"]
makedepends = ["cmake", "ninja", "python", "qt6-base", "qt6-shadertools", "vulkan-headers", "perl"]
provides    = ["libQt6Qml.so", "libQt6Quick.so", "libQt6QuickControls2.so", "libQt6QuickWidgets.so", "libQt6QuickShapes.so", "libQt6QuickTemplates2.so", "libQt6QmlModels.so", "libQt6QmlWorkerScript.so", "libQt6LabsQmlModels.so"]
options     = ["!lto"]

[[source]]
url    = "https://download.qt.io/official_releases/qt/6.11/6.11.1/submodules/qtdeclarative-everywhere-src-6.11.1.tar.xz"
sha256 = "52e670f670b0304f534b24f98c47ceb8a41bb710464414ebc9527ec71cc86aa4"

[steps]
build = '''
cmake -S "qtdeclarative-everywhere-src-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D INSTALL_LIBDIR=/usr/lib -D INSTALL_ARCHDATADIR=/usr/lib/qt6 -D QT_BUILD_EXAMPLES=OFF -D QT_BUILD_TESTS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build;
install -Dm644 "qtdeclarative-everywhere-src-$version/LICENSES/LGPL-3.0-only.txt" "$pkgdir/usr/share/licenses/$name/LICENSE" 2> /dev/null || true
'''
