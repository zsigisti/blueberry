[package]
name     = "ffmpeg"
version  = "8.0"
release  = 1
summary  = "Complete solution to record, convert and stream audio and video"
homepage = "https://ffmpeg.org/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "zlib", "bzip2", "xz"]
makedepends = ["nasm", "pkgconf"]
provides    = ["libavcodec.so", "libavformat.so", "libavutil.so", "libavfilter.so", "libavdevice.so", "libswscale.so", "libswresample.so"]

[[source]]
url    = "https://ffmpeg.org/releases/ffmpeg-8.0.tar.xz"
sha256 = "b2751fccb6cc4c77708113cd78b561059b6fa904b24162fa0be2d60273d27b8e"

[steps]
build = '''
cd "$name-$version"
# Self-contained shared build: only the native codecs (no external encoders), so
# the runtime closure stays small. KDE/Qt link the libav* libraries, not the CLI.
./configure \
  --prefix=/usr \
  --enable-shared --disable-static \
  --enable-gpl --enable-version3 \
  --disable-doc --disable-debug \
  --disable-alsa --disable-vaapi --disable-vdpau \
  --enable-pic
make
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
'''
