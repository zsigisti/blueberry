[package]
name = "libbsd"
version = "0.12.2"
release = 1
summary = "Utility functions from BSD systems"
homepage = "https://libbsd.freedesktop.org/"
license = ["BSD-3-Clause"]
arch = ["x86_64"]
depends = ["glibc", "libmd"]
makedepends = ["pkgconf"]
provides = ["libbsd.so"]
[[source]]
url = "https://libbsd.freedesktop.org/releases/libbsd-0.12.2.tar.xz"
sha256 = "SKIP"
[steps]
build = '''
cd "libbsd-$version";
./configure --prefix=/usr --disable-static;
make
'''
package = '''
cd "libbsd-$version";
make DESTDIR="$pkgdir" install
'''
