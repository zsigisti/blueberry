[package]
name     = "kpeople"
version  = "6.27.0"
release  = 1
summary  = "KDE: unified contact aggregation"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "qt6-declarative", "kcoreaddons", "kconfig", "kcontacts", "kitemviews", "ki18n", "kwidgetsaddons"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/kpeople-6.27.0.tar.xz"
sha256 = "586407310370f9a7fe88773c90e83e227bec7f5f6f860df6540d69db425581d6"

[steps]
build = '''
cmake -S "kpeople-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
