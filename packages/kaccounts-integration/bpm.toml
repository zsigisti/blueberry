[package]
name     = "kaccounts-integration"
version  = "26.04.2"
release  = 1
summary  = "KDE online accounts integration (libkaccounts6) — vendored prebuilt"
homepage = "https://invent.kde.org/network/kaccounts-integration"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

# Vendored prebuilt: the accounts-sso chain (libaccounts-glib/qt + signond) is
# awkward to build from source; bundle the upstream binaries. Used only by the
# attica_kde (KDE store / online accounts) plugin. Bundles the whole cluster so
# the .bpm is self-contained.
depends     = ["glibc", "gcc-libs", "glib2", "sqlite", "libxml2", "qt6-base", "kcoreaddons", "ki18n", "kio", "kconfig"]
makedepends = ["kaccounts-integration", "libaccounts-qt", "libaccounts-glib", "signond"]
provides    = ["libkaccounts6.so", "libaccounts-qt6.so", "libaccounts-glib.so", "libsignon-qt6.so"]

[steps]
build = '''
true
'''
package = '''
install -d "$pkgdir/usr/lib"
cp -P /usr/lib/libkaccounts6.so*     "$pkgdir/usr/lib/"
cp -P /usr/lib/libaccounts-qt6.so*   "$pkgdir/usr/lib/"
cp -P /usr/lib/libaccounts-glib.so*  "$pkgdir/usr/lib/"
cp -P /usr/lib/libsignon-qt6.so*     "$pkgdir/usr/lib/"
'''
