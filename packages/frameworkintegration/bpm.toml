[package]
name     = "frameworkintegration"
version  = "6.27.0"
release  = 1
summary  = "KDE: integrate Qt apps with the KDE workspace"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "kconfig", "kconfigwidgets", "kcoreaddons", "ki18n", "kio", "knewstuff", "knotifications", "kwidgetsaddons", "kiconthemes"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/frameworkintegration-6.27.0.tar.xz"
sha256 = "55eefe8ebc67a040e64c75482276c29a69d0c5877b7b3674f4c7a40238c6d44c"

[steps]
build = '''
cmake -S "frameworkintegration-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
