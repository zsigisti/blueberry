[package]
name     = "squashfs-tools"
version  = "4.7.5"
release  = 1
summary  = "Tools to create and extract squashfs filesystems (mksquashfs/unsquashfs)"
homepage = "https://github.com/plougher/squashfs-tools"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

# zlib/xz/zstd/lz4 are host-provided (etc/bpm/provided). Calamares' unpackfs
# module shells out to unsquashfs to extract the live filesystem.squashfs
# (which mkdesktopiso writes with -comp zstd), so ZSTD support is mandatory.
depends     = ["glibc", "zlib", "xz", "zstd", "lz4"]
makedepends = ["make", "gcc", "zlib", "xz", "zstd", "lz4"]
provides    = ["unsquashfs", "mksquashfs"]

[[source]]
url    = "https://github.com/plougher/squashfs-tools/archive/refs/tags/4.7.5.tar.gz"
sha256 = "547b7b7f4d2e44bf91b6fc554664850c69563701deab9fd9cd7e21f694c88ea6"

[steps]
build = '''
# Use EXTRA_CFLAGS (NOT CFLAGS — overriding CFLAGS clobbers the Makefile's
# -DVERSION/-DCOMP_DEFAULT/… defines). LZO off: we don't ship liblzo2 and the
# live filesystem.squashfs is zstd-compressed.
make -C "$name-$version/squashfs-tools" \
    GZIP_SUPPORT=1 XZ_SUPPORT=1 ZSTD_SUPPORT=1 LZ4_SUPPORT=1 LZO_SUPPORT=0 \
    EXTRA_CFLAGS="-std=gnu17 -Wno-error" \
    mksquashfs unsquashfs
'''
package = '''
install -Dm755 "$name-$version/squashfs-tools/mksquashfs" "$pkgdir/usr/bin/mksquashfs"
install -Dm755 "$name-$version/squashfs-tools/unsquashfs" "$pkgdir/usr/bin/unsquashfs"
'''
