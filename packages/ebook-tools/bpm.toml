[package]
name     = "ebook-tools"
version  = "0.2.2"
release  = 1
summary  = "Tools for accessing and converting various ebook formats (libepub)"
homepage = "https://sourceforge.net/projects/ebook-tools/"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["glibc", "libxml2", "libzip"]
makedepends = ["cmake", "ninja", "libxml2", "libzip"]
provides    = ["libepub.so"]

[[source]]
url    = "https://downloads.sourceforge.net/ebook-tools/ebook-tools-0.2.2.tar.gz"
sha256 = "cbc35996e911144fa62925366ad6a6212d6af2588f1e39075954973bbee627ae"

[steps]
build = '''
cmake -B build -S "$name-$version" -G Ninja \
  -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_POLICY_VERSION_MINIMUM=3.5
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
