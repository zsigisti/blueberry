[package]
name     = "libxshmfence"
version  = "1.3.3"
release  = 1
summary  = "Shared-memory fence library (DRI3/mesa)"
homepage = "https://gitlab.freedesktop.org/xorg/lib/libxshmfence"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["xorg-util-macros", "xorgproto", "pkgconf"]
provides    = ["libxshmfence.so"]

[[source]]
url    = "https://www.x.org/releases/individual/lib/libxshmfence-1.3.3.tar.xz"
sha256 = "d4a4df096aba96fea02c029ee3a44e11a47eb7f7213c1a729be83e85ec3fde10"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static --enable-futex;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
