[package]
name     = "containers-common"
version  = "1.0.1"
release  = 1
summary  = "Default configuration and seccomp profile for podman/containers"
homepage = "https://github.com/containers/common"
license  = ["Apache-2.0"]
arch     = ["any"]

# Config only — no binaries, nothing to link.
depends = []

[[source]]
url    = "https://github.com/containers/common/archive/v1.0.1/common-1.0.1.tar.gz"
sha256 = "155ee3009785cc5283d49c393b2436e48a129d9c3a01bec4bb78416dc75993dd"

[steps]
build = 'true'
package = '''
cd "common-$version"
# Upstream defaults: the base containers.conf and the seccomp profile podman
# applies to every container.
install -Dm644 pkg/config/containers.conf "$pkgdir/usr/share/containers/containers.conf"
install -Dm644 pkg/seccomp/seccomp.json  "$pkgdir/usr/share/containers/seccomp.json"

# Site defaults under /etc/containers (admins edit these).
mkdir -p "$pkgdir/etc/containers"
# Accept any image by default; tighten with a real signature policy later.
printf '{ "default": [ { "type": "insecureAcceptAnything" } ] }\n' \
    > "$pkgdir/etc/containers/policy.json"
# Resolve unqualified names against docker.io, like most distros.
printf 'unqualified-search-registries = ["docker.io"]\n' \
    > "$pkgdir/etc/containers/registries.conf"
# Overlay storage driver (kernel overlayfs).
printf '[storage]\ndriver = "overlay"\nrunroot = "/run/containers/storage"\ngraphroot = "/var/lib/containers/storage"\n' \
    > "$pkgdir/etc/containers/storage.conf"
# Pin the OCI runtime to crun (the only one Blueberry ships) rather than relying
# on podman's auto-detection, which would otherwise look for runc too.
printf '[engine]\nruntime = "crun"\n' \
    > "$pkgdir/etc/containers/containers.conf"
'''
