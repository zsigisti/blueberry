[package]
name     = "grep"
version  = "3.12"
release  = 1
summary  = "GNU grep — core CLI tool (desktop base; busybox covers the server)"
homepage = "https://www.gnu.org/software/grep/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]
depends     = ["glibc", "pcre2"]
makedepends = ["gcc", "make", "pkgconf", "pcre2"]
options     = ["!lto"]

[[source]]
url    = "https://ftp.gnu.org/gnu/grep/grep-3.12.tar.xz"
sha256 = "2649b27c0e90e632eadcd757be06c6e9a4f48d941de51e7c0f83ff76408a07b9"

[steps]
build = '''
cd "grep-$version"
export CFLAGS="-O2 -std=gnu17"
./configure --prefix=/usr
make
'''
package = '''
cd "grep-$version"
make DESTDIR="$pkgdir" install
'''
