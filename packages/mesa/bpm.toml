[package]
name     = "mesa"
version  = "26.1.3"
release  = 1
summary  = "Open-source OpenGL/Vulkan/EGL implementation (Gallium: llvmpipe, radeonsi, iris)"
homepage = "https://www.mesa3d.org/"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["libdrm", "wayland", "libxcb", "libx11", "libxext", "libxfixes", "libxrandr", "libxshmfence", "expat", "zlib", "llvm", "libglvnd", "elfutils", "glibc"]
makedepends = ["meson", "ninja", "python", "wayland-protocols", "glslang", "llvm", "libxml2", "python-mako", "python-packaging", "python-yaml", "pkgconf"]
provides    = ["libgbm.so", "libEGL_mesa.so", "libGLX_mesa.so", "libvulkan_intel.so", "libvulkan_radeon.so", "libxatracker.so", "opengl-driver"]

[[source]]
url    = "https://archive.mesa3d.org/mesa-26.1.3.tar.xz"
sha256 = "7725004e724b34c6d4fbaf5c48fc6c6223aa9f2741d6d7782c699b049356fc45"

[steps]
build = '''
sed -i 's/^  if with_platform_android$/  if true/' "$name-$version/meson.build"
# GCC 16 promotes -Wincompatible-pointer-types to an error (mesa's cnd_monotonic.c
# passes a layout-compatible C11 mtx_t to pthread_cond_*). Relax to a warning.
# MUST be exported: bpmbuild (unlike makepkg.conf) does not export CFLAGS, so a
# bare CFLAGS+=... never reaches meson and the -Werror from meson.build wins.
export CFLAGS="${CFLAGS:-} -Wno-error=incompatible-pointer-types -Wno-error=implicit-function-declaration";
meson setup "$name-$version" build --prefix=/usr --libexecdir=lib --sbindir=bin --buildtype=plain --auto-features=auto --wrap-mode=nodownload -D b_pie=true -D platforms=wayland,x11 -D gallium-drivers=llvmpipe,softpipe -D vulkan-drivers= -D glx=dri -D egl=enabled -D gbm=enabled -D opengl=true -D gles2=enabled -D glvnd=enabled -D llvm=enabled -D shared-llvm=enabled -D gallium-rusticl=false -D valgrind=disabled -D libunwind=disabled -D lmsensors=disabled -D build-tests=false;
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir";
install -Dm644 "$name-$version/docs/license.rst" "$pkgdir/usr/share/licenses/$name/license.rst" 2> /dev/null || true
'''
