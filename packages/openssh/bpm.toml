[package]
name     = "openssh"
version  = "10.3p1"
release  = 2
summary  = "OpenSSH — full SSH server and client suite"
homepage = "https://www.openssh.com/"
license  = ["BSD-2-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "openssl", "zlib"]
# user-editable config — preserved across upgrades (bpm writes a .bpmnew instead)
backup      = ["etc/ssh/sshd_config", "etc/ssh/ssh_config"]

[[source]]
url    = "https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-10.3p1.tar.gz"
sha256 = "56682a36bb92dcf4b4f016fd8ec8e74059b79a8de25c15d670d731e7d18e45f4"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --sysconfdir=/etc/ssh --with-privsep-path=/var/empty --with-privsep-user=nobody --without-pam --with-ssl-engine --with-zlib;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install
'''
