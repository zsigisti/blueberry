[package]
name     = "fail2ban"
version  = "1.1.0"
release  = 1
summary  = "Bans IPs that show malicious signs — brute-force protection for sshd et al."
homepage = "https://www.fail2ban.org"
license  = ["GPL-2.0-or-later"]
arch     = ["any"]

# Pure Python; bans via nftables/iptables at runtime.
depends     = ["python", "nftables", "iptables"]
makedepends = ["python", "python-setuptools"]

[[source]]
url    = "https://github.com/fail2ban/fail2ban/archive/1.1.0/fail2ban-1.1.0.tar.gz"
sha256 = "474fcc25afdaf929c74329d1e4d24420caabeea1ef2e041a267ce19269570bae"

[steps]
build = '''
cd "fail2ban-$version"
python setup.py build
'''
package = '''
cd "fail2ban-$version"
python setup.py install --root="$pkgdir" --optimize=1 --skip-build
# systemd unit is a template (@BINDIR@ → /usr/bin); render + install it.
mkdir -p "$pkgdir/usr/lib/systemd/system"
sed 's#@BINDIR@#/usr/bin#g' files/fail2ban.service.in \
    > "$pkgdir/usr/lib/systemd/system/fail2ban.service"
'''
