[package]
name     = "expat"
version  = "2.8.2"
release  = 1
summary  = "Stream-oriented XML parser library (libexpat)"
homepage = "https://libexpat.github.io/"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["glibc"]
provides    = ["libexpat.so"]

[[source]]
url    = "https://github.com/libexpat/libexpat/releases/download/R_2_8_2/expat-2.8.2.tar.xz"
sha256 = "3ad89b8588e6644bd4e49981480d48b21289eebbcd4f0a1a4afb1c29f99b6ab4"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --without-docbook --disable-static;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install
'''
