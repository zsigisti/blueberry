[package]
name     = "breeze-icons"
version  = "6.27.0"
release  = 1
summary  = "Breeze icon theme — the default Plasma icon set"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["any"]

makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "python-lxml", "qt6-base"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/breeze-icons-6.27.0.tar.xz"
sha256 = "bc8c2337802837ff1809269a8e4c4311b93e7e90c78ab4fe2a86cf5300ffd414"

[steps]
build = '''
cmake -S "breeze-icons-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D BUILD_TESTING=OFF -D BINARY_ICONS_RESOURCE=OFF -D SKIP_INSTALL_ICONS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
