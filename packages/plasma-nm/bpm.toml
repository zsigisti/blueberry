[package]
name     = "plasma-nm"
version  = "6.7.0"
release  = 1
summary  = "KDE: NetworkManager applet for Plasma"
homepage = "https://kde.org/plasma-desktop/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["kcmutils", "kcolorscheme", "kcompletion", "kconfig", "kcoreaddons", "kdbusaddons", "kdeclarative", "ki18n", "kio", "kirigami", "kirigami-addons", "kjobwidgets", "knotifications", "kquickcharts", "kservice", "ksvg", "kwidgetsaddons", "kwindowsystem", "libplasma", "modemmanager-qt", "networkmanager-qt", "openssl", "plasma-workspace", "prison", "qt6-base", "qt6-declarative", "qtkeychain-qt6", "solid", "qcoro"]
makedepends = ["qcoro", "kdoctools", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools", "qtkeychain-qt6", "networkmanager"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/plasma/6.7.0/plasma-nm-6.7.0.tar.xz"
sha256 = "b29680cc17c4bbe52e3b988d5be437ec4b524b554fa180ead13bc8910144cf98"

[steps]
build = '''
cmake -S "plasma-nm-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_LIBEXECDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
