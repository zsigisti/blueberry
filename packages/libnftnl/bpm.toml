[package]
name     = "libnftnl"
version  = "1.2.8"
release  = 1
summary  = "Netlink programming interface to the in-kernel nf_tables subsystem"
homepage = "https://netfilter.org/projects/libnftnl/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "libmnl"]
makedepends = ["pkgconf"]
provides    = ["libnftnl.so"]

[[source]]
url    = "https://www.netfilter.org/projects/libnftnl/files/libnftnl-1.2.8.tar.xz"
sha256 = "37fea5d6b5c9b08de7920d298de3cdc942e7ae64b1a3e8b880b2d390ae67ad95"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install
'''
