[package]
name     = "diffutils"
version  = "3.10"
release  = 1
summary  = "Utilities to compare files (diff, cmp, diff3, sdiff)"
homepage = "https://www.gnu.org/software/diffutils/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]

[[source]]
url    = "https://ftp.gnu.org/gnu/diffutils/diffutils-3.10.tar.xz"
sha256 = "90e5e93cc724e4ebe12ede80df1634063c7a855692685919bfe60b556c9bd09e"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
