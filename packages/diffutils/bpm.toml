[package]
name     = "diffutils"
version  = "3.12"
release  = 1
summary  = "Utilities to compare files (diff, cmp, diff3, sdiff)"
homepage = "https://www.gnu.org/software/diffutils/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]

[[source]]
url    = "https://ftp.gnu.org/gnu/diffutils/diffutils-3.12.tar.xz"
sha256 = "7c8b7f9fc8609141fdea9cece85249d308624391ff61dedaf528fcb337727dfd"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
