[package]
name     = "firefox"
version  = "152.0.1"
release  = 1
summary  = "Mozilla Firefox web browser (official binary, self-contained)"
homepage = "https://www.mozilla.org/firefox/"
license  = ["MPL-2.0"]
arch     = ["x86_64"]

depends     = ["gtk3", "glib2", "dbus", "fontconfig", "freetype2", "libx11", "libxcb", "libxext", "libxrandr", "libxcomposite", "libxdamage", "libxfixes", "mesa", "pango", "cairo", "gdk-pixbuf2", "alsa-lib", "libpulse", "ffmpeg"]
options     = ["!strip", "!debug"]

[[source]]
url    = "https://ftp.mozilla.org/pub/firefox/releases/152.0.1/linux-x86_64/en-US/firefox-152.0.1.tar.xz"
sha256 = "SKIP"

[[source]]
url    = "firefox.desktop"
sha256 = "SKIP"

[steps]
package = '''
install -d "$pkgdir/opt" "$pkgdir/usr/bin" "$pkgdir/usr/share/applications";
cp -a firefox "$pkgdir/opt/firefox";
ln -s /opt/firefox/firefox "$pkgdir/usr/bin/firefox";
for s in 16 32 48 64 128;
do
    if [ -f "firefox/browser/chrome/icons/default/default$s.png" ]; then
        install -Dm644 "firefox/browser/chrome/icons/default/default$s.png" "$pkgdir/usr/share/icons/hicolor/${s}x${s}/apps/firefox.png";
    fi;
done;
install -Dm644 "$srcdir/firefox.desktop" "$pkgdir/usr/share/applications/firefox.desktop"
'''
