[package]
name     = "libimobiledevice-glue"
version  = "1.3.1"
release  = 1
summary  = "Common code used by libimobiledevice/libusbmuxd"
homepage = "https://libimobiledevice.org/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "libplist"]
makedepends = ["pkgconf", "libplist"]
options     = ["!lto"]

[[source]]
url    = "https://github.com/libimobiledevice/libimobiledevice-glue/releases/download/1.3.1/libimobiledevice-glue-1.3.1.tar.bz2"
sha256 = "6e2849f221e6ab970566a115d42f3c20f8848e4d40c2ed61ac20dc85f40fa54f"

[steps]
build = '''
cd "libimobiledevice-glue-$version";
./configure --prefix=/usr --libdir=/usr/lib;
make
'''
package = '''
cd "libimobiledevice-glue-$version";
make DESTDIR="$pkgdir" install
'''
