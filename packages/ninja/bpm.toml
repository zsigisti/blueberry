[package]
name     = "ninja"
version  = "1.13.2"
release  = 1
summary  = "Small, fast build system used by meson"
homepage = "https://ninja-build.org/"
license  = ["Apache-2.0"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs"]
makedepends = ["python", "gcc", "make"]

[[source]]
url    = "https://github.com/ninja-build/ninja/archive/v1.13.2/ninja-1.13.2.tar.gz"
sha256 = "974d6b2f4eeefa25625d34da3cb36bdcebe7fbce40f4c16ac0835fd1c0cbae17"

[steps]
build = '''
cd "$name-$version";
python3 configure.py --bootstrap
'''
package = '''
cd "$name-$version";
install -Dm755 ninja "$pkgdir/usr/bin/ninja"
'''
