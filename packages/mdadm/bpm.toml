[package]
name     = "mdadm"
version  = "4.4"
release  = 2
summary  = "Tool for managing Linux software RAID arrays"
homepage = "https://kernel.org/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "eudev"]
options     = ["!lto"]

[[source]]
url    = "https://www.kernel.org/pub/linux/utils/raid/mdadm/mdadm-4.4.tar.xz"
sha256 = "9b488f35ed153df99924b5fe41eed380e8512de8f18a118628cacdd681b1d573"

[steps]
build = '''
cd "$name-$version";
make CXFLAGS="$CFLAGS" CWFLAGS="-Wall"
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" BINDIR=/usr/bin install
'''
