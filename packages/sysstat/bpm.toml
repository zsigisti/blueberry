[package]
name     = "sysstat"
version  = "12.7.9"
release  = 1
summary  = "System performance tools (sar, iostat, mpstat, pidstat)"
homepage = "https://github.com/sysstat/sysstat"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]
# NLS build runs gettext's msgfmt (which links libxml2/libunistring/…); declare it
# so a working msgfmt and its full runtime closure are installed self-hosted.
makedepends = ["gettext"]

[[source]]
url    = "https://github.com/sysstat/sysstat/archive/refs/tags/v12.7.9.tar.gz"
sha256 = "e48fc69401135dc08d2cd4ff58dbdbfce9b7485f76fc9049d97848e313c08dda"

[steps]
build = '''
cd "$name-$version";
sa_lib_dir=/usr/lib/sa conf_dir=/etc ./configure --prefix=/usr --disable-sensors;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install
'''
