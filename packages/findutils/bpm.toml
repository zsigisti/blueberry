[package]
name     = "findutils"
version  = "4.11.0"
release  = 1
summary  = "GNU findutils — core CLI tool (desktop base; busybox covers the server)"
homepage = "https://www.gnu.org/software/findutils/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]
depends     = ["glibc"]
makedepends = ["gcc", "make", "pkgconf"]
options     = ["!lto"]

[[source]]
url    = "https://ftp.gnu.org/gnu/findutils/findutils-4.11.0.tar.xz"
sha256 = "bfd19cb06cc71f3352d567e90284d8cdac02ac89774bbeadf0b533b0c11432fd"

[steps]
build = '''
cd "findutils-$version"
export CFLAGS="-O2 -std=gnu17"
./configure --prefix=/usr
make
'''
package = '''
cd "findutils-$version"
make DESTDIR="$pkgdir" install
'''
