[package]
name     = "kstatusnotifieritem"
version  = "6.27.0"
release  = 1
summary  = "KDE: system tray status notifier items"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "kwindowsystem", "kguiaddons", "kdbusaddons"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/kstatusnotifieritem-6.27.0.tar.xz"
sha256 = "a2eec2a981ed9da6cffc955cc21a50dcbc77141cbb840d915f92d1897442d239"

[steps]
build = '''
cmake -S "kstatusnotifieritem-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
