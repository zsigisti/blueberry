[package]
name     = "shared-mime-info"
version  = "2.4"
release  = 1
summary  = "Freedesktop.org shared MIME database"
homepage = "https://www.freedesktop.org/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glib2", "libxml2"]
makedepends = ["meson", "ninja", "pkgconf", "gettext", "itstool"]
options     = ["!lto"]

[[source]]
url    = "https://gitlab.freedesktop.org/xdg/shared-mime-info/-/archive/2.4/shared-mime-info-2.4.tar.gz"
sha256 = "531291d0387eb94e16e775d7e73788d06d2b2fdd8cd2ac6b6b15287593b6a2de"

[steps]
build = '''
function arch-meson () 
{ 
    meson setup "$@"
};
meson setup shared-mime-info-2.4 build --prefix=/usr --buildtype=release -Dwerror=false -Dupdate-mimedb=false;
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
