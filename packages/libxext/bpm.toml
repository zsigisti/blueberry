[package]
name     = "libxext"
version  = "1.3.6"
release  = 1
summary  = "X11 miscellaneous extensions library"
homepage = "https://gitlab.freedesktop.org/xorg/lib"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["libx11"]
makedepends = ["xorg-util-macros", "xorgproto", "pkgconf"]
provides    = ["libXext.so"]

[[source]]
url    = "https://www.x.org/releases/individual/lib/libXext-1.3.6.tar.xz"
sha256 = "edb59fa23994e405fdc5b400afdf5820ae6160b94f35e3dc3da4457a16e89753"

[steps]
build = '''
cd "libXext-$version";
./configure --prefix=/usr --sysconfdir=/etc --disable-static;
make
'''
package = '''
cd "libXext-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
