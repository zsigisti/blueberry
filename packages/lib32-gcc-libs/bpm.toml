[package]
name     = "lib32-gcc-libs"
version  = "16.1.0"
release  = 1
summary  = "32-bit GCC runtime libraries (libgcc/libstdc++) — multilib for i686 software"
homepage = "https://gcc.gnu.org/"
license  = ["GPL-3.0-or-later", "LGPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["lib32-glibc", "gcc-libs"]
makedepends = ["lib32-glibc", "binutils", "gmp", "mpfr", "mpc", "zlib", "linux-api-headers"]
options     = ["!lto"]

[[source]]
url    = "https://ftp.gnu.org/gnu/gcc/gcc-16.1.0/gcc-16.1.0.tar.xz"
sha256 = "50efb4d94c3397aff3b0d61a5abd748b4dd31d9d3f2ab7be05b171d36a510f79"

[steps]
build = '''
cd "gcc-$version";
CFLAGS="${CFLAGS//-Werror=format-security/}";
CXXFLAGS="${CXXFLAGS//-Werror=format-security/}";
export CFLAGS CXXFLAGS;
mkdir -p ../build && cd ../build;
../"gcc-$version"/configure --prefix=/usr --libdir=/usr/lib --libexecdir=/usr/lib --enable-languages=c,c++ --enable-multilib --enable-default-pie --enable-default-ssp --enable-__cxa_atexit --disable-bootstrap --disable-werror --disable-nls --without-isl --with-system-zlib;
make
'''
package = '''
cd build;
make -j1 DESTDIR="$pkgdir" install;
install -d "$srcdir/keep";
for lib in libgcc_s libstdc++ libatomic libgomp libquadmath libitm libssp;
do
    cp -a "$pkgdir/usr/lib32/$lib".so* "$srcdir/keep/" 2> /dev/null || true;
done;
rm -rf "$pkgdir"/*;
install -d "$pkgdir/usr/lib32";
cp -a "$srcdir/keep"/* "$pkgdir/usr/lib32/" 2> /dev/null || true
'''
