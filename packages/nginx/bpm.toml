[package]
name     = "nginx"
version  = "1.28.3"
release  = 2
summary  = "Lightweight HTTP server and IMAP/POP3 proxy server"
homepage = "https://nginx.org/"
license  = ["BSD-2-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "pcre2", "zlib", "openssl"]
# user-editable config — preserved across upgrades (bpm writes a .bpmnew instead)
backup      = ["etc/nginx/nginx.conf"]

[[source]]
url    = "https://nginx.org/download/nginx-1.28.3.tar.gz"
sha256 = "2c96a946bfb0882a21744ed429770a2123ae1828c7c48665092993ddee91a918"

[steps]
build = '''
cd "$name-$version";
# GCC 16 promotes several warnings to errors (e.g. unterminated-string-init in
# the HTTP/2 module). Relax via --with-cc-opt so the C sources still build.
./configure --prefix=/etc/nginx --sbin-path=/usr/bin/nginx --conf-path=/etc/nginx/nginx.conf --pid-path=/run/nginx.pid --lock-path=/run/lock/nginx.lock --http-log-path=/var/log/nginx/access.log --error-log-path=/var/log/nginx/error.log --http-client-body-temp-path=/var/lib/nginx/client-body --http-proxy-temp-path=/var/lib/nginx/proxy --with-http_ssl_module --with-http_v2_module --with-http_gzip_static_module --with-http_realip_module --with-http_stub_status_module --with-pcre-jit --with-threads --with-file-aio --with-cc-opt="-Wno-error";
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
rm -rf "$pkgdir/run";
# runtime dirs nginx needs (make install does not create them)
install -dm755 "$pkgdir/var/log/nginx" "$pkgdir/var/lib/nginx";
# runit service (INIT=runit path)
install -dm755 "$pkgdir/etc/sv/nginx";
printf '#!/bin/sh\nexec /usr/bin/nginx -g "daemon off;"\n' > "$pkgdir/etc/sv/nginx/run";
chmod 755 "$pkgdir/etc/sv/nginx/run";
# systemd unit (INIT=systemd, the default). Shipped, not enabled — the admin
# runs `systemctl enable nginx`.
install -dm755 "$pkgdir/usr/lib/systemd/system";
cat > "$pkgdir/usr/lib/systemd/system/nginx.service" <<'UNIT'
[Unit]
Description=nginx HTTP and reverse proxy server
After=network-online.target
Wants=network-online.target

[Service]
Type=forking
PIDFile=/run/nginx.pid
ExecStartPre=/usr/bin/nginx -t -q
ExecStart=/usr/bin/nginx
ExecReload=/usr/bin/nginx -s reload
ExecStop=/usr/bin/nginx -s quit
KillMode=mixed

[Install]
WantedBy=multi-user.target
UNIT
'''
