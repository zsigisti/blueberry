[package]
name     = "libei"
version  = "1.3.0"
release  = 1
summary  = "Library for emulated input (libei + libeis + liboeffis)"
homepage = "https://gitlab.freedesktop.org/libinput/libei"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["glibc", "libevdev"]
makedepends = ["meson", "ninja", "pkgconf", "libevdev", "python-jinja", "python-attrs"]
provides    = ["libei.so", "libeis.so", "liboeffis.so"]

[[source]]
url    = "https://gitlab.freedesktop.org/libinput/libei/-/archive/1.3.0/libei-1.3.0.tar.gz"
sha256 = "162dc7b0d86a4575cdde1d3cb04f364f89a8b1ba6d95fe0b442564e0444d851d"

[steps]
build = '''
arch-meson "$name-$version" build -D tests=disabled -D documentation= -D liboeffis=enabled
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
