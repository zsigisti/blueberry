[package]
name     = "lib32-zlib"
version  = "1.3.1"
release  = 1
summary  = "Compression library (32-bit)"
homepage = "https://www.zlib.net/"
license  = ["Zlib"]
arch     = ["x86_64"]

depends     = ["lib32-glibc"]
makedepends = ["lib32-glibc", "lib32-gcc-libs"]
options     = ["!lto"]

[[source]]
url    = "https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz"
sha256 = "9a93b2b7dfdac77ceba5a558a580e74667dd6fede4585b91eefb60f03b72df23"

[steps]
build = '''
cd "zlib-$version";
CC='gcc -m32' ./configure --prefix=/usr --libdir=/usr/lib32;
make
'''
package = '''
cd "zlib-$version";
make DESTDIR="$pkgdir" install;
rm -rf "$pkgdir/usr/include" "$pkgdir/usr/share"
'''
