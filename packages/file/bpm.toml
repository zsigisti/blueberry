[package]
name     = "file"
version  = "5.46"
release  = 2
summary  = "File type identification utility and libmagic"
homepage = "https://www.darwinsys.com/file/"
license  = ["custom"]
arch     = ["x86_64"]

depends     = ["glibc", "zlib", "bzip2", "xz", "libseccomp"]
provides    = ["libmagic.so"]

[[source]]
url    = "https://astron.com/pub/file/file-5.46.tar.gz"
sha256 = "c9cc77c7c560c543135edc555af609d5619dbef011997e988ce40a3d75d86088"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static --enable-fsect-man5;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
