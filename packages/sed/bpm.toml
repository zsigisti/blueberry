[package]
name     = "sed"
version  = "4.10"
release  = 1
summary  = "GNU sed — core CLI tool (desktop base; busybox covers the server)"
homepage = "https://www.gnu.org/software/sed/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]
depends     = ["glibc"]
makedepends = ["gcc", "make", "pkgconf"]
options     = ["!lto"]

[[source]]
url    = "https://ftp.gnu.org/gnu/sed/sed-4.10.tar.xz"
sha256 = "b8e72182b2ec96a3574e2998c47b7aaa64cc20ce000d8e9ac313cc07cecf28c7"

[steps]
build = '''
cd "sed-$version"
export CFLAGS="-O2 -std=gnu17"
./configure --prefix=/usr
make
'''
package = '''
cd "sed-$version"
make DESTDIR="$pkgdir" install
'''
