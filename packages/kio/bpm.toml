[package]
name     = "kio"
version  = "6.27.0"
release  = 1
summary  = "KDE: network-transparent file access (KIO)"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "qt6-declarative", "karchive", "kbookmarks", "kcompletion", "kconfig", "kconfigwidgets", "kcoreaddons", "kcrash", "kdbusaddons", "kguiaddons", "ki18n", "kitemviews", "kjobwidgets", "knotifications", "kservice", "kwallet", "kwidgetsaddons", "kwindowsystem", "solid", "acl", "libxml2", "libxslt"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "libxslt", "acl"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/kio-6.27.0.tar.xz"
sha256 = "fc201b02c277a35ce81414b1de7e6f851e46b0b5d43beb784936a4a6dc6167d0"

[steps]
build = '''
cmake -S "kio-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
