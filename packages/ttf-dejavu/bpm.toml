[package]
name     = "ttf-dejavu"
version  = "2.37"
release  = 1
summary  = "DejaVu font family — broad Latin/Greek/Cyrillic + symbol coverage (desktop default UI font)"
homepage = "https://dejavu-fonts.github.io/"
license  = ["custom"]
arch     = ["any"]

depends     = ["fontconfig"]
options     = ["!strip"]

[[source]]
url    = "https://github.com/dejavu-fonts/dejavu-fonts/releases/download/version_2_37/dejavu-fonts-ttf-2.37.tar.bz2"
sha256 = "fa9ca4d13871dd122f61258a80d01751d603b4d3ee14095d65453b4e846e17d7"

[steps]
package = '''
cd "dejavu-fonts-ttf-$version";
install -d "$pkgdir/usr/share/fonts/TTF";
install -m644 ttf/*.ttf "$pkgdir/usr/share/fonts/TTF/";
install -d "$pkgdir/usr/share/fontconfig/conf.avail" "$pkgdir/etc/fonts/conf.d";
for c in fontconfig/*.conf;
do
    install -m644 "$c" "$pkgdir/usr/share/fontconfig/conf.avail/" 2> /dev/null || true;
done
'''
