[package]
name     = "slang"
version  = "2.3.3"
release  = 1
summary  = "S-Lang embedded interpreter + tty display library (newt dep)"
homepage = "https://www.jedsoft.org/slang/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]
depends     = ["glibc", "zlib"]
makedepends = ["make", "gcc", "zlib", "pcre2", "libpng"]

[[source]]
url    = "https://www.jedsoft.org/releases/slang/slang-2.3.3.tar.bz2"
sha256 = "f9145054ae131973c61208ea82486d5dd10e3c5cdad23b7c4a0617743c8f5a18"

[steps]
build = '''
cd "$name-$version"
./configure --prefix=/usr --sysconfdir=/etc
# parallel make is racy in slang; build serially
make elf
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install-elf
rm -rf "$pkgdir"/usr/share/doc "$pkgdir"/usr/lib/*.a
'''
