[package]
name     = "kfilemetadata"
version  = "6.27.0"
release  = 1
summary  = "KDE: file metadata extraction"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "karchive", "kconfig", "kcoreaddons", "ki18n"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/kfilemetadata-6.27.0.tar.xz"
sha256 = "27f68558259394ad84d357aa316821672ee66481fa851ddf2a6109f668a6c6a3"

[steps]
build = '''
cmake -S "kfilemetadata-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
