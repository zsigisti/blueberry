[package]
name     = "modemmanager-qt"
version  = "6.27.0"
release  = 1
summary  = "KDE: Qt wrapper for ModemManager"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "modemmanager"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "modemmanager"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/modemmanager-qt-6.27.0.tar.xz"
sha256 = "a893a169dd40c430c51d39326b1af0aab2a9d6c20adc34f2b8e6332c152f6234"

[steps]
build = '''
cmake -S "modemmanager-qt-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
