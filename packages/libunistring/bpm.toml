[package]
name     = "libunistring"
version  = "1.4.2"
release  = 1
summary  = "Library for manipulating Unicode strings and C strings"
homepage = "https://www.gnu.org/software/libunistring/"
license  = ["LGPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]

[[source]]
url    = "https://ftp.gnu.org/gnu/libunistring/libunistring-1.4.2.tar.gz"
sha256 = "e82664b170064e62331962126b259d452d53b227bb4a93ab20040d846fec01d8"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING.LIB "$pkgdir/usr/share/licenses/$name/COPYING.LIB"
'''
