[package]
name     = "libmd"
version  = "1.1.0"
release  = 1
summary  = "Message Digest functions from BSD systems (dependency of libbsd)"
homepage = "https://www.hadrons.org/software/libmd/"
license  = ["BSD-3-Clause", "BSD-2-Clause", "ISC", "custom:Beerware"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["pkgconf"]

[[source]]
url    = "https://archive.hadrons.org/software/libmd/libmd-1.1.0.tar.xz"
sha256 = "1bd6aa42275313af3141c7cf2e5b964e8b1fd488025caf2f971f43b00776b332"

[steps]
build = '''
cd "libmd-$version"
./configure --prefix=/usr --disable-static
make
'''
package = '''
cd "libmd-$version"
make install DESTDIR="$pkgdir"
'''
