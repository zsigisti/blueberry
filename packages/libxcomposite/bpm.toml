[package]
name     = "libxcomposite"
version  = "0.4.7"
release  = 1
summary  = "X11 Composite extension library"
homepage = "https://www.freedesktop.org/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["libx11", "libxfixes"]
makedepends = ["pkgconf", "xorgproto"]
options     = ["!lto"]

[[source]]
url    = "libXcomposite-0.4.7.tar.xz::https://www.x.org/releases/individual/lib/libXcomposite-0.4.7.tar.xz"
sha256 = "8bdf310967f484503fa51714cf97bff0723d9b673e0eecbf92b3f97c060c8ccb"

[steps]
build = '''
cd "libXcomposite-0.4.7";
./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var;
make
'''
package = '''
cd "libXcomposite-0.4.7";
make DESTDIR="$pkgdir" install
'''
