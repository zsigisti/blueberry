[package]
name     = "gdk-pixbuf2"
version  = "2.44.6"
release  = 1
summary  = "Image loading and manipulation library for GTK"
homepage = "https://www.freedesktop.org/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glib2", "libpng", "libjpeg-turbo", "libtiff", "shared-mime-info"]
makedepends = ["glib2-devel", "meson", "ninja", "pkgconf", "python"]
options     = ["!lto"]

[[source]]
url    = "gdk-pixbuf-2.44.6.tar.xz::https://download.gnome.org/sources/gdk-pixbuf/2.44/gdk-pixbuf-2.44.6.tar.xz"
sha256 = "140c2d0b899fcf853ee92b26373c9dc228dbcde0820a4246693f4328a27466fa"

[steps]
build = '''
function arch-meson () 
{ 
    meson setup "$@"
};
meson setup gdk-pixbuf-2.44.6 build --prefix=/usr --buildtype=release -Dwerror=false -Dintrospection=disabled -Dman=false -Dgtk_doc=false -Dtests=false -Dglycin=disabled;
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
