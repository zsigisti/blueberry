[package]
name     = "qt6-tools"
version  = "6.11.1"
release  = 1
summary  = "Qt 6 development tools — Designer, Linguist, UiTools, Assistant"
homepage = "https://www.qt.io"
license  = ["GPL-3.0-only", "LGPL-3.0-only"]
arch     = ["x86_64"]

depends     = ["qt6-base", "qt6-declarative"]
makedepends = ["cmake", "ninja", "qt6-base", "qt6-declarative", "vulkan-headers"]
provides    = ["libQt6UiTools.so", "libQt6Designer.so", "libQt6DesignerComponents.so", "libQt6Help.so"]

[[source]]
url    = "https://download.qt.io/official_releases/qt/6.11/6.11.1/submodules/qttools-everywhere-src-6.11.1.tar.xz"
sha256 = "8e61835a679c93fa9c6065b142353c2071ba68e297898937c32a03777fcaf50d"

[steps]
build = '''
cmake -S "qttools-everywhere-src-$version" -B build -G Ninja \
  -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr \
  -D INSTALL_LIBDIR=/usr/lib -D INSTALL_ARCHDATADIR=/usr/lib/qt6 \
  -D QT_BUILD_EXAMPLES=OFF -D QT_BUILD_TESTS=OFF \
  -D FEATURE_clang=OFF -D FEATURE_assistant=OFF -D FEATURE_qdoc=OFF
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
