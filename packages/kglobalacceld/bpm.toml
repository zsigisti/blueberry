[package]
name     = "kglobalacceld"
version  = "6.7.0"
release  = 1
summary  = "KDE: daemon for global keyboard shortcuts"
homepage = "https://kde.org/plasma-desktop/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["kconfig", "kcoreaddons", "kcrash", "kdbusaddons", "kglobalaccel", "kio", "kjobwidgets", "kservice", "kwindowsystem", "libx11", "libxcb", "qt6-base", "xcb-util-keysyms"]
makedepends = ["kdoctools", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/plasma/6.7.0/kglobalacceld-6.7.0.tar.xz"
sha256 = "ff5e36dcbcb8182f1b695062993a9ea2cc73d267536b2f5926de039fa7732c65"

[steps]
build = '''
cmake -S "kglobalacceld-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_LIBEXECDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
