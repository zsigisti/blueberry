[package]
name     = "libpng"
version  = "1.6.44"
release  = 1
summary  = "PNG reference library"
homepage = "http://www.libpng.org/pub/png/libpng.html"
license  = ["custom"]
arch     = ["x86_64"]

depends     = ["zlib", "glibc"]
provides    = ["libpng16.so"]

[[source]]
url    = "https://downloads.sourceforge.net/libpng/libpng-1.6.44.tar.xz"
sha256 = "60c4da1d5b7f0aa8d158da48e8f8afa9773c1c8baa5d21974df61f1886b8ce8e"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 LICENSE "$pkgdir/usr/share/licenses/$name/LICENSE"
'''
