[package]
name     = "okular"
version  = "26.04.2"
release  = 1
summary  = "KDE: the Okular universal document viewer"
homepage = "https://kde.org/plasma-desktop/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["karchive", "kbookmarks", "kcolorscheme", "kcompletion", "kconfig", "kconfigwidgets", "kcoreaddons", "kcrash", "ki18n", "kiconthemes", "kio", "kparts", "ktextwidgets", "kwallet", "kwidgetsaddons", "kwindowsystem", "kxmlgui", "libkexiv2", "libtiff", "phonon-qt6", "poppler-qt6", "purpose", "qt6-base", "qt6-declarative", "qt6-svg", "threadweaver", "freetype2", "zlib"]
makedepends = ["kdoctools", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools", "poppler-qt6", "phonon-qt6", "libtiff", "qt6-speech"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/release-service/26.04.2/src/okular-26.04.2.tar.xz"
sha256 = "d51cc5be96f6e491181608b0115af37d20ee15b080b6e42c0c00e29b9e058abe"

[steps]
build = '''
cmake -S "okular-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_LIBEXECDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF -D FORCE_NOT_REQUIRED_DEPENDENCIES="LibSpectre;DjVuLibre;EPub;QMobipocket6;Discount";
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
