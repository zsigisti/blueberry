[package]
name     = "git"
version  = "2.55.0"
release  = 1
summary  = "The fast distributed version control system"
homepage = "https://git-scm.com/"
license  = ["GPL-2.0-only"]
arch     = ["x86_64"]

depends     = ["curl", "openssl", "expat", "zlib", "pcre2"]
# git 2.55 builds a Rust core library (target/release/libgitcore.a) as part of
# `make all`, so cargo/rustc are needed at build time (static lib — no runtime dep).
makedepends = ["rust"]

[[source]]
url    = "https://mirrors.kernel.org/pub/software/scm/git/git-2.55.0.tar.xz"
sha256 = "457fdb04dc8728e007d4688695e6912e6f680727920f2a40bf11eacc17505357"

[steps]
# Upstream PKGBUILD wraps make in a _make() helper carrying the build knobs; the
# TOML steps run as plain /bin/sh, so define it inline (no PKGBUILD functions).
build = '''
_make() {
  make prefix=/usr CURLDIR=/usr NO_GETTEXT=1 NO_TCLTK=1 NO_PERL=1 NO_PYTHON=1 USE_LIBPCRE=0 INSTALL_SYMLINKS=1 "$@"
}
cd "$name-$version"
_make all
'''
package = '''
_make() {
  make prefix=/usr CURLDIR=/usr NO_GETTEXT=1 NO_TCLTK=1 NO_PERL=1 NO_PYTHON=1 USE_LIBPCRE=0 INSTALL_SYMLINKS=1 "$@"
}
cd "$name-$version"
_make DESTDIR="$pkgdir" install
'''
