[package]
name     = "kirigami-addons"
version  = "1.9.0"
release  = 1
summary  = "KDE: additional Kirigami QML components"
homepage = "https://kde.org/plasma-desktop/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["kcolorscheme", "kconfig", "kcoreaddons", "kcrash", "kglobalaccel", "kguiaddons", "ki18n", "kiconthemes", "kirigami", "kitemmodels", "ksvg", "qt6-base", "qt6-declarative", "qt6-multimedia", "sonnet"]
makedepends = ["kdoctools", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools", "qt6-multimedia"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/kirigami-addons/kirigami-addons-1.9.0.tar.xz"
sha256 = "21314a91f26b1c962def3fd7ff2e762d3358b075f63f4d7e0144fb2c63b7ebc7"

[steps]
build = '''
cmake -S "kirigami-addons-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_LIBEXECDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
