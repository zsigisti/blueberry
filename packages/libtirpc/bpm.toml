[package]
name     = "libtirpc"
version  = "1.3.6"
release  = 1
summary  = "Transport-Independent RPC library (libtirpc.so.3) — the SunRPC replacement"
homepage = "https://sourceforge.net/projects/libtirpc/"
license  = ["BSD-3-Clause"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["pkgconf"]
provides    = ["libtirpc.so"]

[[source]]
url    = "https://downloads.sourceforge.net/libtirpc/libtirpc-1.3.6.tar.bz2"
sha256 = "bbd26a8f0df5690a62a47f6aa30f797f3ef8d02560d1bc449a83066b5a1d3508"

[steps]
build = '''
cd "libtirpc-$version"
# --disable-gssapi: keep it self-contained (GSS would pull in krb5).
# -std=gnu17: the sources use K&R function definitions that GCC 16's C23 default
# rejects.
./configure --prefix=/usr --sysconfdir=/etc --disable-static --disable-gssapi \
    CFLAGS="-O2 -std=gnu17"
make
'''
package = '''
cd "libtirpc-$version"
make install DESTDIR="$pkgdir"
'''
