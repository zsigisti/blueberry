[package]
name="libtirpc"
version="1.3.6"
release=1
summary="Transport-Independent RPC library — libtirpc.so.3 (libnsl dependency)"
homepage="https://sourceforge.net/projects/libtirpc/"
license=["BSD-3-Clause"]
arch=["x86_64"]
depends=["glibc"]
makedepends=["gcc","make","pkgconf"]
options=["!lto"]
[[source]]
url="https://downloads.sourceforge.net/libtirpc/libtirpc-1.3.6.tar.bz2"
sha256="bbd26a8f0df5690a62a47f6aa30f797f3ef8d02560d1bc449a83066b5a1d3508"
[steps]
build='''
tar xf "libtirpc-$version.tar.bz2" 2>/dev/null || true  # bpmbuild auto-extract is unreliable here
cd "libtirpc-$version"
# GCC16/C23: empty () means "no args" → xdr_opaque_auth() conflicts. -std=gnu17
# restores K&R "unspecified args" semantics.
export CFLAGS="-O2 -std=gnu17"
./configure --prefix=/usr --disable-static --disable-gssapi
make
'''
package='''
cd "libtirpc-$version"
make DESTDIR="$pkgdir" install
'''
