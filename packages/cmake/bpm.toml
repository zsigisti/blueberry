[package]
name     = "cmake"
version  = "4.4.0"
release  = 1
summary  = "Cross-platform build-system generator"
homepage = "https://cmake.org/"
license  = ["BSD-3-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs", "ncurses"]
makedepends = ["gcc", "make"]

# Bootstrap with bundled third-party libs (CMAKE_USE_SYSTEM_LIBRARIES=OFF) so the
# result depends only on the base — no need to package curl/libarchive/jsoncpp/…
[[source]]
url    = "https://github.com/Kitware/CMake/releases/download/v4.4.0/cmake-4.4.0.tar.gz"
sha256 = "65757f442fdd242e27f1728fc26dc0cba4164f7a0791a5c788631c00080369bc"

[steps]
build = '''
cd "$name-$version";
./bootstrap --prefix=/usr --parallel="$(nproc)" --no-qt-gui \
    -- -DCMAKE_USE_SYSTEM_LIBRARIES=OFF -DCMAKE_BUILD_TYPE=Release;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install
'''
