[package]
name     = "libxcursor"
version  = "1.2.2"
release  = 1
summary  = "X cursor management library"
homepage = "https://gitlab.freedesktop.org/xorg/lib"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["libxrender", "libxfixes"]
makedepends = ["xorg-util-macros", "xorgproto", "pkgconf"]
provides    = ["libXcursor.so"]

[[source]]
url    = "https://www.x.org/releases/individual/lib/libXcursor-1.2.2.tar.xz"
sha256 = "53d071bd2cc56e517a30998d5e685c8a74556ddada43c6985d14da9a023a88ee"

[steps]
build = '''
cd "libXcursor-$version";
./configure --prefix=/usr --sysconfdir=/etc --disable-static;
make
'''
package = '''
cd "libXcursor-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
