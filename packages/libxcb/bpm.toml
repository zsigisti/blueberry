[package]
name     = "libxcb"
version  = "1.17.0"
release  = 1
summary  = "X11 client-side C binding to the X protocol (XCB)"
homepage = "https://xcb.freedesktop.org/"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["libxau", "libxdmcp", "glibc"]
makedepends = ["xcb-proto", "xorgproto", "python", "libxslt", "pkgconf"]
provides    = ["libxcb.so", "libxcb-composite.so", "libxcb-damage.so", "libxcb-dbe.so", "libxcb-dpms.so", "libxcb-dri2.so", "libxcb-dri3.so", "libxcb-glx.so", "libxcb-present.so", "libxcb-randr.so", "libxcb-record.so", "libxcb-render.so", "libxcb-res.so", "libxcb-screensaver.so", "libxcb-shape.so", "libxcb-shm.so", "libxcb-sync.so", "libxcb-xfixes.so", "libxcb-xinput.so", "libxcb-xkb.so"]

[[source]]
url    = "https://xorg.freedesktop.org/archive/individual/lib/libxcb-1.17.0.tar.xz"
sha256 = "599ebf9996710fea71622e6e184f3a8ad5b43d0e5fa8c4e407123c88a59a6d55"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static --enable-xinput --enable-xkb;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
