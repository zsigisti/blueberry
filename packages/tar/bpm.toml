[package]
name     = "tar"
version  = "1.35"
release  = 1
summary  = "GNU tar — core CLI tool (desktop base; busybox covers the server)"
homepage = "https://www.gnu.org/software/tar/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]
depends     = ["glibc"]
makedepends = ["gcc", "make", "pkgconf"]
options     = ["!lto"]

[[source]]
url    = "https://ftp.gnu.org/gnu/tar/tar-1.35.tar.xz"
sha256 = "4d62ff37342ec7aed748535323930c7cf94acf71c3591882b26a7ea50f3edc16"

[steps]
build = '''
cd "tar-$version"
export CFLAGS="-O2 -std=gnu17"
./configure --prefix=/usr
make
'''
package = '''
cd "tar-$version"
make DESTDIR="$pkgdir" install
'''
