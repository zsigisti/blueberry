[package]
name     = "libevent"
version  = "2.1.12"
release  = 1
summary  = "Event notification library"
homepage = "https://libevent.org/"
license  = ["BSD"]
arch     = ["x86_64"]

depends     = ["glibc"]
provides    = ["libevent-2.1.so", "libevent_core-2.1.so", "libevent_extra-2.1.so", "libevent_pthreads-2.1.so"]

[[source]]
url    = "https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz"
sha256 = "92e6de1be9ec176428fd2367677e61ceffc2ee1cb119035037a27d346b0403bb"

[steps]
build = '''
_srcdir="libevent-$version-stable";
cd "$_srcdir";
./configure --prefix=/usr --disable-static --disable-openssl;
make
'''
package = '''
_srcdir="libevent-$version-stable";
cd "$_srcdir";
make DESTDIR="$pkgdir" install
'''
