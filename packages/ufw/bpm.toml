[package]
name     = "ufw"
version  = "0.36.2"
release  = 2
summary  = "Uncomplicated Firewall (iptables front-end)"
homepage = "https://launchpad.net/ufw"
license  = ["GPL-3.0-only"]
arch     = ["x86_64"]
depends     = ["python", "iptables"]
makedepends = ["python", "python-setuptools"]

[[source]]
url    = "https://launchpad.net/ufw/0.36/0.36.2/+download/ufw-0.36.2.tar.gz"
sha256 = "2a57a99eecef6b44db3537ed2520b30bae3759f8465456e22e404cd643838bf5"

[steps]
build = 'true'
package = '''
cd "$name-$version"
# ufw's setup.py is distutils-based; Python 3.12+ removed stdlib distutils, so
# use setuptools' vendored shim (activated by its distutils-precedence .pth).
export SETUPTOOLS_USE_DISTUTILS=local
python setup.py install --root="$pkgdir" --prefix=/usr
# Pin the entry-point interpreter to the real python path (setup.py otherwise
# bakes in whatever absolute path the build python had, e.g. /usr/sbin/python).
for s in "$pkgdir"/usr/sbin/ufw "$pkgdir"/usr/bin/ufw; do
    [ -f "$s" ] && sed -i '1s|^#!.*|#!/usr/bin/python3|' "$s"
done
# setup.py drops config under /etc; systemd unit for boot-time enable
install -Dm644 doc/systemd.example "$pkgdir/usr/lib/systemd/system/ufw.service"
rm -rf "$pkgdir"/usr/share/man
'''
