[package]
name     = "libxtst"
version  = "1.2.5"
release  = 1
summary  = "X11 Testing Resource extension library"
homepage = "https://www.freedesktop.org/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["libx11", "libxext", "libxi"]
makedepends = ["pkgconf", "xorgproto"]
options     = ["!lto"]

[[source]]
url    = "https://www.x.org/releases/individual/lib/libXtst-1.2.5.tar.xz"
sha256 = "b50d4c25b97009a744706c1039c598f4d8e64910c9fde381994e1cae235d9242"

[steps]
build = '''
cd "libXtst-1.2.5";
./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var;
make
'''
package = '''
cd "libXtst-1.2.5";
make DESTDIR="$pkgdir" install
'''
