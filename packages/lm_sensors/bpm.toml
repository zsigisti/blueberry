[package]
name     = "lm_sensors"
version  = "3.6.0"
release  = 1
summary  = "Hardware health monitoring — libsensors + sensors CLI"
homepage = "https://github.com/lm-sensors/lm-sensors"
license  = ["LGPL-2.1-or-later", "GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["flex", "bison", "which"]
provides    = ["libsensors.so"]

[[source]]
url    = "https://github.com/lm-sensors/lm-sensors/archive/V3-6-0/lm-sensors-3-6-0.tar.gz"
sha256 = "0591f9fa0339f0d15e75326d0365871c2d4e2ed8aa1ff759b3a55d3734b7d197"

[steps]
build = '''
cd lm-sensors-3-6-0
make PREFIX=/usr LIBDIR=/usr/lib BUILD_STATIC_LIB=0 user
'''
package = '''
cd lm-sensors-3-6-0
make PREFIX=/usr LIBDIR=/usr/lib BUILD_STATIC_LIB=0 DESTDIR="$pkgdir" user_install
'''
