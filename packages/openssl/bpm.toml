[package]
name     = "openssl"
version  = "3.4.0"
release  = 1
summary  = "TLS/SSL and crypto library"
homepage = "https://www.openssl.org/"
license  = ["Apache"]
arch     = ["x86_64"]

depends     = ["glibc", "zlib"]
makedepends = ["perl"]
provides    = ["libcrypto.so", "libssl.so"]

[[source]]
url    = "https://github.com/openssl/openssl/releases/download/openssl-3.4.0/openssl-3.4.0.tar.gz"
sha256 = "e15dda82fe2fe8139dc2ac21a36d4ca01d5313c75f99f46c4e8a27709b7294bf"

[steps]
build = '''
cd "$name-$version";
./Configure --prefix=/usr --openssldir=/etc/ssl --libdir=lib shared zlib enable-ktls linux-x86_64;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" MANSUFFIX=ssl install_sw install_ssldirs
'''
