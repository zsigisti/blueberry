[package]
name     = "libdatrie"
version  = "0.2.14"
release  = 1
summary  = "Double-array trie library"
homepage = "https://www.freedesktop.org/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["pkgconf"]
options     = ["!lto"]

[[source]]
url    = "libdatrie-0.2.14.tar.xz::https://github.com/tlwg/libdatrie/releases/download/v0.2.14/libdatrie-0.2.14.tar.xz"
sha256 = "f04095010518635b51c2313efa4f290b7db828d6273e39b2b8858f859dfe81d5"

[steps]
build = '''
cd "libdatrie-0.2.14";
./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var;
make
'''
package = '''
cd "libdatrie-0.2.14";
make DESTDIR="$pkgdir" install
'''
