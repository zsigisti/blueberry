[package]
name     = "postgresql"
version  = "17.2"
release  = 1
summary  = "Sophisticated object-relational DBMS"
homepage = "https://www.postgresql.org/"
license  = ["PostgreSQL"]
arch     = ["x86_64"]

depends     = ["glibc", "readline", "zlib", "openssl", "lz4", "zstd"]
makedepends = ["pkgconf", "bison", "flex", "perl"]

[[source]]
url    = "https://ftp.postgresql.org/pub/source/v17.2/postgresql-17.2.tar.bz2"
sha256 = "82ef27c0af3751695d7f64e2d963583005fbb6a0c3df63d0e4b42211d7021164"

[steps]
build = '''
cd "$name-$version";
# GCC 16 defaults to C23 where `bool` is a keyword, breaking PostgreSQL's
# `typedef ... bool` in c.h. Pin the C dialect to gnu17.
export CFLAGS="${CFLAGS:-} -std=gnu17";
./configure --prefix=/usr --sysconfdir=/etc --datarootdir=/usr/share \
  --with-openssl --with-readline --with-zlib --with-lz4 --with-zstd \
  --without-icu --with-system-tzdata=/usr/share/zoneinfo \
  --disable-rpath;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
# a persistent service account (no package-created user) + data dir
install -Dm644 /dev/stdin "$pkgdir/usr/lib/sysusers.d/postgresql.conf" <<'SYSU'
u postgres - "PostgreSQL server" /var/lib/postgres
SYSU
install -Dm644 /dev/stdin "$pkgdir/usr/lib/tmpfiles.d/postgresql.conf" <<'TMPF'
d /var/lib/postgres 0700 postgres postgres -
d /var/lib/postgres/data 0700 postgres postgres -
TMPF
# systemd unit — shipped, not enabled. The admin initdb's the cluster first:
#   sudo -u postgres initdb -D /var/lib/postgres/data
install -Dm644 /dev/stdin "$pkgdir/usr/lib/systemd/system/postgresql.service" <<'UNIT'
[Unit]
Description=PostgreSQL database server
After=network.target

[Service]
Type=notify
User=postgres
Group=postgres
Environment=PGROOT=/var/lib/postgres
Environment=PGDATA=/var/lib/postgres/data
ExecStart=/usr/bin/postgres -D ${PGDATA}
ExecReload=/bin/kill -HUP $MAINPID
TimeoutSec=120
RuntimeDirectory=postgresql

[Install]
WantedBy=multi-user.target
UNIT
install -Dm644 COPYRIGHT "$pkgdir/usr/share/licenses/$name/COPYRIGHT"
'''
