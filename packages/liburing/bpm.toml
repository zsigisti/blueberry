[package]
name     = "liburing"
version  = "2.8"
release  = 1
summary  = "Linux kernel io_uring access library"
homepage = "https://github.com/axboe/liburing"
license  = ["LGPL-2.1-or-later", "MIT"]
arch     = ["x86_64"]

depends     = ["glibc"]
provides    = ["liburing.so"]

[[source]]
url    = "liburing-2.8.tar.gz::https://github.com/axboe/liburing/archive/refs/tags/liburing-2.8.tar.gz"
sha256 = "SKIP"

[steps]
# Build only the library (top-level make also builds examples/tests wanting a
# live kernel). Install the lib + headers explicitly into /usr/lib.
build = '''
cd "liburing-liburing-$version";
./configure --prefix=/usr --libdir=/usr/lib --libdevdir=/usr/lib --includedir=/usr/include --mandir=/usr/share/man;
make -C src
'''
package = '''
cd "liburing-liburing-$version";
# liburing's src/Makefile install target ignores DESTDIR, so install by hand.
install -d "$pkgdir/usr/lib" "$pkgdir/usr/include/liburing";
install -Dm755 "src/liburing.so.$version"     "$pkgdir/usr/lib/liburing.so.$version";
install -Dm755 "src/liburing-ffi.so.$version" "$pkgdir/usr/lib/liburing-ffi.so.$version";
ln -sf "liburing.so.$version"     "$pkgdir/usr/lib/liburing.so.2";
ln -sf "liburing.so.$version"     "$pkgdir/usr/lib/liburing.so";
ln -sf "liburing-ffi.so.$version" "$pkgdir/usr/lib/liburing-ffi.so.2";
ln -sf "liburing-ffi.so.$version" "$pkgdir/usr/lib/liburing-ffi.so";
cp -a src/include/liburing.h "$pkgdir/usr/include/";
cp -a src/include/liburing/*.h "$pkgdir/usr/include/liburing/" 2>/dev/null || true
'''
