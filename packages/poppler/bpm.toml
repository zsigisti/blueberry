[package]
name     = "poppler"
version  = "26.06.0"
release  = 1
summary  = "PDF rendering library (libpoppler + Qt6 frontend)"
homepage = "https://poppler.freedesktop.org/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs", "fontconfig", "freetype2", "libjpeg-turbo", "libpng", "libtiff", "lcms2", "nss", "nspr", "openjpeg2", "curl", "cairo", "qt6-base"]
makedepends = ["cmake", "ninja", "pkgconf", "fontconfig", "freetype2", "libjpeg-turbo", "libpng", "libtiff", "lcms2", "nss", "nspr", "openjpeg2", "curl", "cairo", "qt6-base", "gobject-introspection"]
provides    = ["libpoppler.so", "libpoppler-qt6.so", "libpoppler-cpp.so"]

[[source]]
url    = "https://poppler.freedesktop.org/poppler-26.06.0.tar.xz"
sha256 = "4cb4e5a3dc8cb5eec751c8a23c8ba19f61f96dedc0cd07d2aee6b0c8e2cf6ba4"

[steps]
build = '''
cmake -B build -S "$name-$version" -G Ninja \
  -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
  -DENABLE_QT6=ON -DENABLE_QT5=OFF -DENABLE_GLIB=OFF \
  -DENABLE_NSS3=ON -DENABLE_GPGME=OFF -DENABLE_BOOST=OFF \
  -DBUILD_GTK_TESTS=OFF -DBUILD_QT6_TESTS=OFF -DBUILD_CPP_TESTS=OFF \
  -DBUILD_MANUAL_TESTS=OFF -DENABLE_UTILS=OFF -DRUN_GPERF_IF_PRESENT=OFF
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
