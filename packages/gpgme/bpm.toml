[package]
name     = "gpgme"
version  = "1.24.1"
release  = 1
summary  = "GnuPG Made Easy — high-level crypto API (C + C++ bindings)"
homepage = "https://gnupg.org/software/gpgme/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "libgpg-error", "libassuan"]
makedepends = ["pkgconf", "gnupg"]
provides    = ["libgpgme.so", "libgpgmepp.so"]

[[source]]
url    = "https://gnupg.org/ftp/gcrypt/gpgme/gpgme-1.24.1.tar.bz2"
sha256 = "ea05d0258e71061d61716584ec34cef59330a91340571edc46b78374973ba85f"

[steps]
build = '''
cd "$name-$version"
./configure --prefix=/usr --disable-static \
  --enable-languages=cpp --disable-gpg-test --disable-gpgsm-test
make
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
'''
