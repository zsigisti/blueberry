[package]
name     = "gpgme"
version  = "2.0.0"
release  = 1
summary  = "GnuPG Made Easy — high-level crypto API (C + C++ bindings)"
homepage = "https://gnupg.org/software/gpgme/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "libgpg-error", "libassuan"]
makedepends = ["pkgconf", "gnupg"]
# 2.0 bumps the C++ binding soname to libgpgmepp.so.7 (what KDE links).
provides    = ["libgpgme.so", "libgpgmepp.so"]

[[source]]
url    = "https://gnupg.org/ftp/gcrypt/gpgme/gpgme-2.0.0.tar.bz2"
sha256 = "ddf161d3c41ff6a3fcbaf4be6c6e305ca4ef1cc3f1ecdfce0c8c2a167c0cc36d"

[steps]
build = '''
cd "$name-$version"
# gpgme 2.0 builds the C++ binding by default when g++ is present; the old
# --enable-languages=cpp value is rejected ("unsupported language binding").
./configure --prefix=/usr --disable-static --disable-gpg-test
make
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
'''
