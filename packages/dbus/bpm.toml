[package]
name     = "dbus"
version  = "1.16.0"
release  = 3
summary  = "Freedesktop.org message bus system (libdbus + dbus-daemon)"
homepage = "https://www.freedesktop.org/wiki/Software/dbus/"
license  = ["GPL-2.0-or-later OR AFL-2.1"]
arch     = ["x86_64"]

depends     = ["glibc", "expat", "systemd"]
makedepends = ["meson", "ninja", "pkgconf"]

[[source]]
url    = "https://dbus.freedesktop.org/releases/dbus/dbus-1.16.0.tar.xz"
sha256 = "9f8ca5eb51cbe09951aec8624b86c292990ae2428b41b856e2bed17ec65c8849"

[steps]
build = '''
cd "$name-$version";
meson setup build --prefix=/usr --libdir=lib --buildtype=release -Dsystemd=enabled -Dsystemd_system_unitdir=/usr/lib/systemd/system -Dsystemd_user_unitdir=/usr/lib/systemd/user -Dselinux=disabled -Dapparmor=disabled -Dlibaudit=disabled -Dx11_autolaunch=disabled -Ddoxygen_docs=disabled -Dducktype_docs=disabled -Dxml_docs=disabled -Dmodular_tests=disabled;
meson compile -C build
'''
package = '''
cd "$name-$version";
meson install -C build --destdir="$pkgdir";
# dbus-1.pc lists `Requires.private: libsystemd` because dbus-daemon links
# libsystemd (sd_notify/activation). But libdbus-1's PUBLIC headers expose no
# libsystemd types, so that private require is only consumed when STATIC-linking
# libdbus-1 — which nothing in Blueberry does. Left in, it makes dbus-1.pc
# unparseable during systemd's own build (systemd reads dbus-1.pc for its path
# vars but is the sole provider of libsystemd.pc, so pkg-config can't resolve it):
# a build-time dependency cycle. Strip it — the daemon keeps its libsystemd
# linkage; only the .pc's static-link hint is dropped.
sed -i '/^Requires\.private:.*libsystemd/d' "$pkgdir/usr/lib/pkgconfig/dbus-1.pc";
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
