[package]
name     = "kidletime"
version  = "6.27.0"
release  = 1
summary  = "KDE: monitoring user activity / idle time"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "qt6-wayland", "wayland"]
makedepends = ["plasma-wayland-protocols", "qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-wayland", "wayland-protocols"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/kidletime-6.27.0.tar.xz"
sha256 = "2cb0196ee3bb1b60be9bad14b4d04dfaf53b3d0017cd459083035c715910551b"

[steps]
build = '''
cmake -S "kidletime-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
