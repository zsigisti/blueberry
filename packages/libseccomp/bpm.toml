[package]
name     = "libseccomp"
version  = "2.6.1"
release  = 1
summary  = "High level interface to the Linux seccomp filter"
homepage = "https://github.com/seccomp/libseccomp"
license  = ["LGPL-2.1-only"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["gperf"]

[[source]]
url    = "https://github.com/seccomp/libseccomp/releases/download/v2.6.1/libseccomp-2.6.1.tar.gz"
sha256 = "501f66c667225d53791b97e1d7cf85ab764c297d04881f60f38f451c4b0ee1be"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 LICENSE "$pkgdir/usr/share/licenses/$name/LICENSE"
'''
