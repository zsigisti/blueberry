[package]
name     = "libseccomp"
version  = "2.5.5"
release  = 1
summary  = "High level interface to the Linux seccomp filter"
homepage = "https://github.com/seccomp/libseccomp"
license  = ["LGPL-2.1-only"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["gperf"]

[[source]]
url    = "https://github.com/seccomp/libseccomp/releases/download/v2.5.5/libseccomp-2.5.5.tar.gz"
sha256 = "248a2c8a4d9b9858aa6baf52712c34afefcf9c9e94b76dce02c1c9aa25fb3375"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 LICENSE "$pkgdir/usr/share/licenses/$name/LICENSE"
'''
