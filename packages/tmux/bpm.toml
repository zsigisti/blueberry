[package]
name     = "tmux"
version  = "3.7b"
release  = 1
summary  = "Terminal multiplexer"
homepage = "https://github.com/tmux/tmux"
license  = ["ISC"]
arch     = ["x86_64"]

depends     = ["glibc", "ncurses", "libevent"]

[[source]]
url    = "https://github.com/tmux/tmux/releases/download/3.7b/tmux-3.7b.tar.gz"
sha256 = "87f2e99e3b685973f2ca002ffd6ed7e51a5744f7009daae5a15670b6d532db96"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --sysconfdir=/etc;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 example_tmux.conf "$pkgdir/usr/share/tmux/example_tmux.conf";
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
