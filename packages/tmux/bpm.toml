[package]
name     = "tmux"
version  = "3.5a"
release  = 1
summary  = "Terminal multiplexer"
homepage = "https://github.com/tmux/tmux"
license  = ["ISC"]
arch     = ["x86_64"]

depends     = ["glibc", "ncurses", "libevent"]

[[source]]
url    = "https://github.com/tmux/tmux/releases/download/3.5a/tmux-3.5a.tar.gz"
sha256 = "16216bd0877170dfcc64157085ba9013610b12b082548c7c9542cc0103198951"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --sysconfdir=/etc;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 example_tmux.conf "$pkgdir/usr/share/tmux/example_tmux.conf";
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
