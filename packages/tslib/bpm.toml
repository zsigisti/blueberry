[package]
name     = "tslib"
version  = "1.22"
release  = 1
summary  = "Touchscreen access library"
homepage = "https://github.com/libts/tslib"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["autoconf", "automake", "libtool", "pkgconf"]
provides    = ["libts.so"]

[[source]]
url    = "https://github.com/libts/tslib/releases/download/1.22/tslib-1.22.tar.xz"
sha256 = "aaf0aed410a268d7b51385d07fe4d9d64312038e87c447ec8a24c8db0a15617a"

[steps]
build = '''
cd "$name-$version"
./configure --prefix=/usr --disable-static
make
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
'''
