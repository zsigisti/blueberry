[package]
name     = "ripgrep"
version  = "14.1.1"
release  = 2
summary  = "A recursive line-oriented search tool that respects gitignore (rg)"
homepage = "https://github.com/BurntSushi/ripgrep"
license  = ["MIT", "Unlicense"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs", "pcre2"]
makedepends = ["rust"]
options     = ["!lto"]

[[source]]
url    = "https://github.com/BurntSushi/ripgrep/archive/14.1.1/ripgrep-14.1.1.tar.gz"
sha256 = "4dad02a2f9c8c3c8d89434e47337aa654cb0e2aa50e806589132f186bf5c2b66"

[steps]
build = '''
cd "$name-$version";
export CARGO_HOME="$srcdir/cargo";
cargo build --release --features pcre2
'''
package = '''
cd "$name-$version";
install -Dm755 target/release/rg "$pkgdir/usr/bin/rg";
# rg.1 and the bash completion are generated by the build script under out/.
man=$(find target/release/build -name rg.1 | head -1);
[ -n "$man" ] && install -Dm644 "$man" "$pkgdir/usr/share/man/man1/rg.1";
bc=$(find target/release/build -name rg.bash | head -1);
[ -n "$bc" ] && install -Dm644 "$bc" "$pkgdir/usr/share/bash-completion/completions/rg";
# _rg (zsh) lives in complete/ on some releases and is generated on others.
zc=$(find . -name _rg | head -1);
[ -n "$zc" ] && install -Dm644 "$zc" "$pkgdir/usr/share/zsh/site-functions/_rg";
install -Dm644 LICENSE-MIT "$pkgdir/usr/share/licenses/$name/LICENSE-MIT";
install -Dm644 UNLICENSE "$pkgdir/usr/share/licenses/$name/UNLICENSE"
'''
