[package]
name     = "libtasn1"
version  = "4.21.0"
release  = 1
summary  = "ASN.1 structure parser library"
homepage = "https://www.gnu.org/software/libtasn1/"
license  = ["LGPL-2.1-or-later", "GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["pkgconf"]
provides    = ["libtasn1.so"]

[[source]]
url    = "https://ftp.gnu.org/gnu/libtasn1/libtasn1-4.21.0.tar.gz"
sha256 = "1d8a444a223cc5464240777346e125de51d8e6abf0b8bac742ac84609167dc87"

[steps]
build = '''
cd "$name-$version"
./configure --prefix=/usr --disable-static
make
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
'''
