[package]
name     = "libtasn1"
version  = "4.19.0"
release  = 1
summary  = "ASN.1 structure parser library"
homepage = "https://www.gnu.org/software/libtasn1/"
license  = ["LGPL-2.1-or-later", "GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["pkgconf"]
provides    = ["libtasn1.so"]

[[source]]
url    = "https://ftp.gnu.org/gnu/libtasn1/libtasn1-4.19.0.tar.gz"
sha256 = "1613f0ac1cf484d6ec0ce3b8c06d56263cc7242f1c23b30d82d23de345a63f7a"

[steps]
build = '''
cd "$name-$version"
./configure --prefix=/usr --disable-static
make
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
'''
