[package]
name     = "qalculate"
version  = "5.11.0"
release  = 1
summary  = "Multi-purpose desktop calculator library (libqalculate)"
homepage = "https://qalculate.github.io/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs", "cln", "mpfr", "gmp", "icu", "libxml2", "curl", "readline"]
makedepends = ["cln", "mpfr", "gmp", "icu", "libxml2", "curl", "readline", "pkgconf", "intltool", "doxygen"]
provides    = ["libqalculate.so"]

[[source]]
url    = "https://github.com/Qalculate/libqalculate/releases/download/v5.11.0/libqalculate-5.11.0.tar.gz"
sha256 = "6217a634eeb9659ebb4080c265dfab47d8f8dd4c33394b48fd5a1f83ef4538c4"

[steps]
build = '''
cd "libqalculate-$version"
./configure --prefix=/usr --disable-static
make
'''
package = '''
cd "libqalculate-$version"
make DESTDIR="$pkgdir" install
'''
