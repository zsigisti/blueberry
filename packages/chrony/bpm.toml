[package]
name     = "chrony"
version  = "4.6.1"
release  = 4
summary  = "Versatile implementation of the Network Time Protocol (NTP)"
homepage = "https://chrony-project.org/"
license  = ["GPL-2.0-only"]
arch     = ["x86_64"]

depends     = ["glibc", "libcap", "libedit"]

[[source]]
url    = "https://chrony-project.org/releases/chrony-4.6.1.tar.gz"
sha256 = "571ff73fbf0ae3097f0604eca2e00b1d8bb2e91affe1a3494785ff21d6199c5c"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --sysconfdir=/etc --without-readline --without-nettle --without-gnutls --without-nss --without-seccomp --disable-sechash;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
# Minimal default config (upstream ships none): a public NTP pool + drift file.
# pidfile matches the systemd unit's PIDFile.
install -dm755 "$pkgdir/etc";
cat > "$pkgdir/etc/chrony.conf" <<'CONF'
pool pool.ntp.org iburst
driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync
pidfile /run/chrony/chronyd.pid
CONF
# runit service (INIT=runit path). chronyd path is /usr/sbin/chronyd.
install -dm755 "$pkgdir/etc/sv/chrony";
printf '#!/bin/sh\nexec /usr/sbin/chronyd -d -f /etc/chrony.conf\n' > "$pkgdir/etc/sv/chrony/run";
chmod 755 "$pkgdir/etc/sv/chrony/run";
# systemd unit (INIT=systemd, the default). Conflicts with timesyncd (the base
# time sync) — enabling chrony replaces it. Shipped, not enabled.
install -dm755 "$pkgdir/usr/lib/systemd/system";
cat > "$pkgdir/usr/lib/systemd/system/chronyd.service" <<'UNIT'
[Unit]
Description=chrony NTP client/server
After=network-online.target
Wants=network-online.target
Conflicts=systemd-timesyncd.service

[Service]
Type=forking
PIDFile=/run/chrony/chronyd.pid
RuntimeDirectory=chrony
StateDirectory=chrony
ExecStart=/usr/sbin/chronyd -f /etc/chrony.conf
ExecStartPost=-/usr/bin/chronyc online

[Install]
WantedBy=multi-user.target
UNIT
'''
