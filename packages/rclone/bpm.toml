[package]
name     = "rclone"
version  = "1.74.4"
release  = 1
summary  = "Sync files and directories to and from major cloud storage providers"
homepage = "https://rclone.org/"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["go", "git"]

[[source]]
url    = "https://github.com/rclone/rclone/archive/v1.74.4/rclone-1.74.4.tar.gz"
sha256 = "b8279a31a5249e4aecf04acff744ace4a2e3a169e4539a24aa67a9994f645d3b"

[steps]
build = '''
cd "$name-$version";
export GOPATH="$srcdir/gopath" GOCACHE="$srcdir/gocache" GOFLAGS="-mod=mod" CGO_ENABLED=0;
go build -tags noselfupdate -trimpath \
  -ldflags "-s -w -X github.com/rclone/rclone/fs.Version=v1.74.4" -o rclone .;
./rclone genautocomplete bash rclone.bash || true;
./rclone genautocomplete zsh rclone.zsh || true;
mkdir -p man; ./rclone --help >/dev/null 2>&1 || true
'''
package = '''
cd "$name-$version";
install -Dm755 rclone "$pkgdir/usr/bin/rclone";
[ -f rclone.bash ] && install -Dm644 rclone.bash "$pkgdir/usr/share/bash-completion/completions/rclone";
[ -f rclone.zsh ] && install -Dm644 rclone.zsh "$pkgdir/usr/share/zsh/site-functions/_rclone";
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
