[package]
name     = "dosfstools"
version  = "4.2"
release  = 1
summary  = "DOS filesystem utilities (mkfs.fat, fsck.fat)"
homepage = "https://github.com/dosfstools/dosfstools"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]

[[source]]
url    = "https://github.com/dosfstools/dosfstools/releases/download/v4.2/dosfstools-4.2.tar.gz"
sha256 = "64926eebf90092dca21b14259a5301b7b98e7b1943e8a201c7d726084809b527"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --enable-compat-symlinks --mandir=/usr/share/man;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install
'''
