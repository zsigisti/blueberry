[package]
name     = "gdbm"
version  = "1.26"
release  = 1
summary  = "GNU database library (dbm) with the ndbm/dbm compatibility shim"
homepage = "https://www.gnu.org/software/gdbm/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "readline"]

[[source]]
url    = "https://ftp.gnu.org/gnu/gdbm/gdbm-1.26.tar.gz"
sha256 = "6a24504a14de4a744103dcb936be976df6fbe88ccff26065e54c1c47946f4a5e"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static --enable-libgdbm-compat CFLAGS="${CFLAGS:-} -std=gnu17";
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
