[package]
name     = "ksystemstats"
version  = "6.7.0"
release  = 1
summary  = "KDE: system statistics daemon"
homepage = "https://kde.org/plasma-desktop/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["kcoreaddons", "kcrash", "ki18n", "kio", "libksysguard", "lm_sensors", "qt6-base", "solid", "networkmanager-qt"]
makedepends = ["kdoctools", "networkmanager-qt", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/plasma/6.7.0/ksystemstats-6.7.0.tar.xz"
sha256 = "2224ce41e42e75845aa886e192e7833ce638b86aa31ca0e4e3cb31ef36e4066b"

[steps]
build = '''
cmake -S "ksystemstats-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_LIBEXECDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
