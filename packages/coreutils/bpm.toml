[package]
name     = "coreutils"
version  = "9.11"
release  = 1
summary  = "GNU core utilities — cat/ls/cp/tail/env/sleep… (systemd base, no busybox)"
homepage = "https://www.gnu.org/software/coreutils/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "libcap", "openssl", "gmp", "acl", "attr"]
makedepends = ["gcc", "make", "pkgconf", "libcap", "openssl", "gmp"]
options     = ["!lto"]

[[source]]
url    = "https://ftp.gnu.org/gnu/coreutils/coreutils-9.11.tar.xz"
sha256 = "394024eda0a5955217ceda9cd1201e65dc8fa3aa29c2951135a49521d57c3cc3"

[steps]
build = '''
cd "coreutils-$version"
export FORCE_UNSAFE_CONFIGURE=1
export CFLAGS="-O2 -std=gnu17"
./configure --prefix=/usr --libexecdir=/usr/lib \
  --enable-no-install-program=kill,uptime --with-openssl
make
'''
package = '''
cd "coreutils-$version"
make DESTDIR="$pkgdir" install
# Historical /bin paths a few scripts still hard-code.
install -d "$pkgdir/bin"
for b in cat ls cp mv rm ln mkdir rmdir echo pwd sleep env tty head tail \
         chmod chown chgrp date stat readlink basename dirname mktemp; do
    [ -e "$pkgdir/usr/bin/$b" ] && ln -sf "../usr/bin/$b" "$pkgdir/bin/$b"
done
'''
