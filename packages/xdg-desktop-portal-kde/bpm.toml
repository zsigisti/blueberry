[package]
name     = "xdg-desktop-portal-kde"
version  = "6.7.0"
release  = 1
summary  = "KDE: xdg-desktop-portal backend for Plasma"
homepage = "https://kde.org/plasma-desktop/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["kcmutils", "kconfig", "kcoreaddons", "kcrash", "kdeclarative", "kglobalaccel", "kiconthemes", "ki18n", "kio", "kirigami", "kirigami-addons", "kitemviews", "knotifications", "kpipewire", "kservice", "kstatusnotifieritem", "kwayland", "kwindowsystem", "libxkbcommon", "plasma-workspace", "qt6-base", "qt6-declarative", "wayland", "xdg-desktop-portal"]
makedepends = ["kdoctools", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools", "qt6-wayland", "wayland-protocols"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/plasma/6.7.0/xdg-desktop-portal-kde-6.7.0.tar.xz"
sha256 = "f5afc06f948b73b2a0103d9ee6e57744a9884a3f2e0810807776ec4bf7102ada"

[steps]
build = '''
cmake -S "xdg-desktop-portal-kde-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_LIBEXECDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
