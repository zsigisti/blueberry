[package]
name     = "pulseaudio-qt"
version  = "1.7.0"
release  = 1
summary  = "Qt6 bindings for PulseAudio — libKF6PulseAudioQt.so.5 (Plasma volume applet)"
homepage = "https://invent.kde.org/libraries/pulseaudio-qt"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]
depends     = ["qt6-base", "qt6-declarative", "libpulse"]
makedepends = ["extra-cmake-modules", "cmake", "ninja", "qt6-base", "qt6-declarative", "qt6-tools", "libpulse"]
options     = ["!lto"]
[[source]]
url    = "https://download.kde.org/stable/pulseaudio-qt/pulseaudio-qt-1.7.0.tar.xz"
sha256 = "6a18db76dd2bcc3df7d9a9379c025295817264baa1f2ed8caaac7da44e04e931"
[steps]
build = '''
cmake -S "pulseaudio-qt-$version" -B build -G Ninja \
  -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr \
  -D KDE_INSTALL_LIBDIR=lib -D BUILD_TESTING=OFF
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
