[package]
name     = "plasma-integration"
version  = "6.7.0"
release  = 1
summary  = "KDE: Qt Platform Theme integration for Plasma"
homepage = "https://kde.org/plasma-desktop/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["kcolorscheme", "kconfig", "kcoreaddons", "kguiaddons", "kiconthemes", "ki18n", "kio", "kjobwidgets", "kservice", "kstatusnotifieritem", "kwidgetsaddons", "kwindowsystem", "libxcb", "libxcursor", "qqc2-breeze-style", "qqc2-desktop-style", "qt6-base", "qt6-declarative", "wayland", "noto-fonts", "xdg-desktop-portal-kde"]
makedepends = ["plasma-wayland-protocols", "noto-fonts", "kdoctools", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools", "qt6-wayland", "wayland-protocols"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/plasma/6.7.0/plasma-integration-6.7.0.tar.xz"
sha256 = "537b05cd4bab1b0706fb31f9823f8666df7295e647e75614f02b6bf1458eff1d"

[steps]
build = '''
cmake -S "plasma-integration-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_LIBEXECDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF -D BUILD_QT5=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
