[package]
name     = "libtool"
version  = "2.6.2"
release  = 1
summary  = "GNU generic library support script (libtool + libltdl)"
homepage = "https://www.gnu.org/software/libtool/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "bash", "m4", "tar"]
provides    = ["libltdl.so"]
makedepends = ["m4", "make", "gcc"]

[[source]]
url    = "https://ftp.gnu.org/gnu/libtool/libtool-2.6.2.tar.xz"
sha256 = "2ef1067c16c97db930fd740cc9bc3d3ba9a583804ae5ac42cc3e8719e49e191e"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install
'''
