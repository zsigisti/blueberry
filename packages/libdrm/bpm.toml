[package]
name     = "libdrm"
version  = "2.4.123"
release  = 1
summary  = "Userspace interface to kernel DRM services"
homepage = "https://dri.freedesktop.org/"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["glibc", "libpciaccess"]
makedepends = ["meson", "ninja", "libpciaccess"]
provides    = ["libdrm.so", "libdrm_amdgpu.so", "libdrm_intel.so", "libdrm_nouveau.so", "libdrm_radeon.so"]

[[source]]
url    = "https://dri.freedesktop.org/libdrm/libdrm-2.4.123.tar.xz"
sha256 = "a2b98567a149a74b0f50e91e825f9c0315d86e7be9b74394dae8b298caadb79e"

[steps]
build = '''
arch-meson "$name-$version" build -D udev=true -D valgrind=disabled -D man-pages=disabled -D tests=false -D cairo-tests=disabled -D install-test-programs=false;
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
