[package]
name     = "qt6-sensors"
version  = "6.11.1"
release  = 1
summary  = "Qt 6 sensors module"
homepage = "https://www.qt.io/"
license  = ["LGPL-3.0-only"]
arch     = ["x86_64"]

depends     = ["qt6-base", "qt6-declarative"]
makedepends = ["cmake", "ninja", "python", "qt6-base", "qt6-declarative", "perl"]
options     = ["!lto"]

[[source]]
url    = "https://download.qt.io/official_releases/qt/6.11/6.11.1/submodules/qtsensors-everywhere-src-6.11.1.tar.xz"
sha256 = "23617062da7be526d023dec7f9b76231001a1098a7e5f94c646f2e4f87cfcf8f"

[steps]
build = '''
cmake -S "qtsensors-everywhere-src-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D INSTALL_LIBDIR=/usr/lib -D INSTALL_ARCHDATADIR=/usr/lib/qt6 -D QT_BUILD_EXAMPLES=OFF -D QT_BUILD_TESTS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
