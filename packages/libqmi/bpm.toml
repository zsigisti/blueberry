[package]
name     = "libqmi"
version  = "1.34.0"
release  = 1
summary  = "QMI modem protocol helper library (libqmi-glib)"
homepage = "https://www.freedesktop.org/wiki/Software/libqmi/"
license  = ["LGPL-2.1-or-later", "GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "glib2", "libgudev", "libmbim"]
makedepends = ["meson", "ninja", "pkgconf", "glib2", "glib2-devel", "libgudev", "libmbim", "python", "bash-completion", "help2man"]
provides    = ["libqmi-glib.so"]

[[source]]
url    = "https://gitlab.freedesktop.org/mobile-broadband/libqmi/-/archive/1.34.0/libqmi-1.34.0.tar.gz"
sha256 = "8690d25b4d110b6df28b31da0a8bf16c7e966d31abcfeeb854f2753451e7a400"

[steps]
build = '''
arch-meson "$name-$version" build \
  -D introspection=false -D man=false -D bash_completion=false -D gtk_doc=false \
  -D mbim_qmux=true -D qrtr=false
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
