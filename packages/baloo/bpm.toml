[package]
name     = "baloo"
version  = "6.27.0"
release  = 1
summary  = "KDE: file indexing and search framework"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "qt6-declarative", "kconfig", "kcoreaddons", "kcrash", "kdbusaddons", "kfilemetadata", "kidletime", "kio", "ki18n", "solid", "lmdb"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "lmdb"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/baloo-6.27.0.tar.xz"
sha256 = "6b226118bde28e81217f8cd6129f6e24c5d422bd7a322fe682e592b028b72db7"

[steps]
build = '''
cmake -S "baloo-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
