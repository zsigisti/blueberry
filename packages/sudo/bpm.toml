[package]
name     = "sudo"
version  = "1.9.17p2"
release  = 1
summary  = "Give certain users the ability to run some commands as root"
homepage = "https://www.sudo.ws/sudo/"
license  = ["custom"]
arch     = ["x86_64"]

depends     = ["glibc", "openssl"]

[[source]]
url    = "https://www.sudo.ws/dist/sudo-1.9.17p2.tar.gz"
sha256 = "4a38a1ab3adb1199257edc2a7c4a2bd714665eb605b04368843b06dada2cfcfb"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --sbindir=/usr/bin --libexecdir=/usr/lib --with-rundir=/run/sudo --with-vardir=/var/lib/sudo --without-pam --with-env-editor --with-secure-path;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -dm755 "$pkgdir/etc";
# /etc/sudoers.d must exist AND be @includedir'd, or Calamares' users module
# fails with "cannot create sudoers file for writing" when it drops 10-installer.
install -dm750 "$pkgdir/etc/sudoers.d";
printf '%%wheel ALL=(ALL:ALL) ALL\nroot ALL=(ALL:ALL) ALL\n@includedir /etc/sudoers.d\n' > "$pkgdir/etc/sudoers";
chmod 440 "$pkgdir/etc/sudoers"
'''
