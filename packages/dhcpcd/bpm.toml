[package]
name     = "dhcpcd"
version  = "10.1.0"
release  = 3
summary  = "RFC2131 compliant DHCP client daemon"
homepage = "https://roy.marples.name/projects/dhcpcd"
license  = ["BSD-2-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "eudev", "openssl"]

[[source]]
url    = "https://github.com/NetworkConfiguration/dhcpcd/releases/download/v10.1.0/dhcpcd-10.1.0.tar.xz"
sha256 = "abc307c63853da3199baa5c1e15fd5ede9d68d068b2a59ca14c5a6768e9cc3b7"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --sysconfdir=/etc --libexecdir=/usr/lib/dhcpcd --dbdir=/var/lib/dhcpcd --rundir=/run --privsepuser=dhcpcd;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -dm755 "$pkgdir/etc/sv/dhcpcd";
printf '#!/bin/sh\nexec /usr/bin/dhcpcd -B\n' > "$pkgdir/etc/sv/dhcpcd/run";
chmod 755 "$pkgdir/etc/sv/dhcpcd/run"
'''
