[package]
name     = "dhcpcd"
version  = "10.1.0"
release  = 4
summary  = "RFC2131 compliant DHCP client daemon"
homepage = "https://roy.marples.name/projects/dhcpcd"
license  = ["BSD-2-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "eudev", "openssl"]

[[source]]
url    = "https://github.com/NetworkConfiguration/dhcpcd/releases/download/v10.1.0/dhcpcd-10.1.0.tar.xz"
sha256 = "abc307c63853da3199baa5c1e15fd5ede9d68d068b2a59ca14c5a6768e9cc3b7"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --sysconfdir=/etc --libexecdir=/usr/lib/dhcpcd --dbdir=/var/lib/dhcpcd --rundir=/run --privsepuser=dhcpcd;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
# runit service (INIT=runit path). Binary is /usr/sbin/dhcpcd.
install -dm755 "$pkgdir/etc/sv/dhcpcd";
printf '#!/bin/sh\nexec /usr/sbin/dhcpcd -B\n' > "$pkgdir/etc/sv/dhcpcd/run";
chmod 755 "$pkgdir/etc/sv/dhcpcd/run";
# The build uses --privsepuser=dhcpcd, so that user must exist. Ship a
# sysusers.d fragment; systemd-sysusers creates it at boot (INIT=systemd).
install -dm755 "$pkgdir/usr/lib/sysusers.d";
cat > "$pkgdir/usr/lib/sysusers.d/dhcpcd.conf" <<'SYSU'
u dhcpcd - "dhcpcd privilege separation" /var/lib/dhcpcd
SYSU
# systemd unit (INIT=systemd, the default). Alternative to systemd-networkd's
# DHCP. Shipped, not enabled — the admin runs `systemctl enable dhcpcd`.
install -dm755 "$pkgdir/usr/lib/systemd/system";
cat > "$pkgdir/usr/lib/systemd/system/dhcpcd.service" <<'UNIT'
[Unit]
Description=dhcpcd DHCP client
Wants=network.target
Before=network.target

[Service]
Type=forking
PIDFile=/run/dhcpcd/pid
ExecStart=/usr/sbin/dhcpcd -q -b
ExecStop=/usr/sbin/dhcpcd -x

[Install]
WantedBy=multi-user.target
UNIT
'''
