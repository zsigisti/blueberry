[package]
name     = "netcat"
version  = "0.7.1"
release  = 1
summary  = "TCP/IP swiss-army knife: read and write across network connections (nc)"
homepage = "https://netcat.sourceforge.net/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["make", "gcc"]
provides    = ["nc"]

[[source]]
url    = "https://downloads.sourceforge.net/project/netcat/netcat/0.7.1/netcat-0.7.1.tar.gz"
sha256 = "30719c9a4ffbcf15676b8f528233ccc54ee6cba96cb4590975f5fd60c68a066f"

[steps]
build = '''
cd "$name-$version"
# 2004-era source; GCC 16 defaults reject implicit ints/decls and non-common vars.
export CFLAGS="${CFLAGS:-} -std=gnu17 -fcommon -Wno-implicit-int -Wno-implicit-function-declaration"
./configure --prefix=/usr
make -j"$(nproc)"
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
ln -sf netcat "$pkgdir/usr/bin/nc"
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
