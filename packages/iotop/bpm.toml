[package]
name     = "iotop"
version  = "1.31"
release  = 1
summary  = "Monitor per-process I/O usage in real time (iotop-c, ncurses UI)"
homepage = "https://github.com/Tomas-M/iotop"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "ncurses"]
makedepends = ["pkgconf"]

[[source]]
url    = "https://github.com/Tomas-M/iotop/archive/v1.31/iotop-1.31.tar.gz"
sha256 = "658a615eb1def9dddcf0c325efebb4f78b101a040fff33ef7afaaa39c2471669"

[steps]
build = '''
cd "$name-$version";
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 LICENSE "$pkgdir/usr/share/licenses/$name/LICENSE"
'''
