[package]
name     = "taglib"
version  = "2.0.2"
release  = 1
summary  = "Library for reading and editing audio metadata tags"
homepage = "https://taglib.org/"
license  = ["LGPL-2.1-only", "MPL-1.1"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs", "zlib"]
makedepends = ["cmake", "ninja", "utf8cpp"]
provides    = ["libtag.so", "libtag_c.so"]

[[source]]
url    = "https://taglib.org/releases/taglib-2.0.2.tar.gz"
sha256 = "0de288d7fe34ba133199fd8512f19cc1100196826eafcb67a33b224ec3a59737"

[steps]
build = '''
cmake -B build -S "$name-$version" -G Ninja \
  -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
  -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
