[package]
name     = "editorconfig-core-c"
version  = "0.12.9"
release  = 1
summary  = "EditorConfig core library written in C (libeditorconfig)"
homepage = "https://github.com/editorconfig/editorconfig-core-c"
license  = ["BSD-2-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "pcre2"]
makedepends = ["cmake", "ninja", "pcre2"]
provides    = ["libeditorconfig.so"]

[[source]]
url    = "https://github.com/editorconfig/editorconfig-core-c/archive/v0.12.9/editorconfig-core-c-0.12.9.tar.gz"
sha256 = "4aaa4e3883332aac7ec19c169dcf128f5f0f963f61d09beb299eb2bce5944e2c"

[steps]
build = '''
cmake -B build -S "$name-$version" -G Ninja \
  -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
  -DBUILD_DOCUMENTATION=OFF
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
