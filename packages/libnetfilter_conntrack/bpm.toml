[package]
name     = "libnetfilter_conntrack"
version  = "1.0.9"
release  = 1
summary  = "Userspace library for the in-kernel connection tracking state table"
homepage = "https://www.netfilter.org/projects/libnetfilter_conntrack/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "libnfnetlink", "libmnl"]
makedepends = ["pkgconf"]

[[source]]
url    = "https://www.netfilter.org/projects/libnetfilter_conntrack/files/libnetfilter_conntrack-1.0.9.tar.bz2"
sha256 = "67bd9df49fe34e8b82144f6dfb93b320f384a8ea59727e92ff8d18b5f4b579a8"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
