[package]
name     = "vulkan-headers"
version  = "1.4.304"
release  = 1
summary  = "Vulkan header files and API registry"
homepage = "https://github.com/KhronosGroup/Vulkan-Headers"
license  = ["Apache-2.0"]
arch     = ["any"]

makedepends = ["cmake", "ninja"]

[[source]]
url    = "vulkan-headers-1.4.304.tar.gz::https://github.com/KhronosGroup/Vulkan-Headers/archive/refs/tags/v1.4.304.tar.gz"
sha256 = "5e1a06b3f27e7581b55d1dea176fd97ee0a2f299406db2f437c1d2f297ceba5b"

[steps]
build = '''
cmake -S "Vulkan-Headers-$version" -B build -G Ninja -D CMAKE_INSTALL_PREFIX=/usr
'''
package = '''
DESTDIR="$pkgdir" cmake --install build;
install -Dm644 "Vulkan-Headers-$version/LICENSE.md" "$pkgdir/usr/share/licenses/$name/LICENSE.md"
'''
