[package]
name = "xorg-xwayland"
version = "24.1.6"
release = 1
summary = "Run X clients under Wayland (Xwayland server)"
homepage = "https://xorg.freedesktop.org/"
license = ["MIT"]
arch = ["x86_64"]
depends = ["glibc", "libdrm", "libepoxy", "mesa", "pixman", "wayland", "libxkbcommon", "libxcvt", "libxfont2", "openssl", "libxau", "libxdmcp"]
makedepends = ["meson", "ninja", "xorgproto", "xtrans", "wayland-protocols", "font-util", "pkgconf", "python"]
provides = ["Xwayland"]
[[source]]
url = "https://www.x.org/releases/individual/xserver/xwayland-24.1.6.tar.xz"
sha256 = "SKIP"
[steps]
build = '''
meson setup "xwayland-$version" build --prefix=/usr --buildtype=release \
  -D xwayland_eglstream=false \
  -D xkb_dir=/usr/share/X11/xkb \
  -D xkb_output_dir=/var/lib/xkb \
  -D default_font_path=/usr/share/fonts/misc \
  -D sha1=libcrypto \
  -D secure-rpc=false \
  -D ipv6=true \
  -D xcsecurity=true \
  -D dri3=true \
  -D glamor=true;
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
