[package]
name = "xorg-xwayland"
version = "24.1.6"
release = 1
summary = "Run X clients under Wayland (Xwayland server)"
homepage = "https://xorg.freedesktop.org/"
license = ["MIT"]
arch = ["x86_64"]
depends = ["glibc", "libdrm", "libepoxy", "mesa", "pixman", "wayland", "libxkbcommon", "libxcvt", "libxfont2", "libxkbfile", "openssl", "libxau", "libxdmcp"]
makedepends = ["meson", "ninja", "xorgproto", "xtrans", "wayland-protocols", "font-util", "pkgconf", "python", "libxkbfile"]
provides = ["Xwayland"]
[[source]]
url = "https://www.x.org/releases/individual/xserver/xwayland-24.1.6.tar.xz"
sha256 = "SKIP"
[steps]
build = '''
meson setup "xwayland-$version" build --prefix=/usr --buildtype=release \
  -D xkb_dir=/usr/share/X11/xkb \
  -D xkb_output_dir=/var/lib/xkb \
  -D default_font_path=/usr/share/fonts/misc \
  -D secure-rpc=false \
  -D libunwind=false \
  -D dtrace=false \
  -D docs=false \
  -D devel-docs=false;
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
