[package]
name     = "ktextwidgets"
version  = "6.27.0"
release  = 1
summary  = "KDE: advanced text editing widgets"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "kcompletion", "kconfig", "kconfigwidgets", "kcoreaddons", "ki18n", "kwidgetsaddons", "sonnet"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/ktextwidgets-6.27.0.tar.xz"
sha256 = "03c35d8899559efc17b4f74e86eefd8358dafd7aa9311c89b9c09f7b35700756"

[steps]
build = '''
cmake -S "ktextwidgets-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
