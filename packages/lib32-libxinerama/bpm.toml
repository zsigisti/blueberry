[package]
name     = "lib32-libxinerama"
version  = "1.1.6"
release  = 1
summary  = "X11 Xinerama extension library (32-bit)"
homepage = "https://www.freedesktop.org/"
license  = ["custom"]
arch     = ["x86_64"]

depends     = ["lib32-glibc", "lib32-libx11", "lib32-libxext"]
makedepends = ["lib32-glibc", "lib32-gcc-libs", "xorgproto", "xorg-util-macros", "pkgconf", "lib32-libx11", "lib32-libxext"]
options     = ["!lto", "!strip"]

[[source]]
url    = "libXinerama-1.1.6.tar.xz::https://www.x.org/releases/individual/lib/libXinerama-1.1.6.tar.xz"
sha256 = "d00fc1599c303dc5cbc122b8068bdc7405d6fcb19060f4597fc51bd3a8be51d7"

[steps]
build = '''
export CC="gcc -m32" CXX="g++ -m32" PKG_CONFIG_PATH=/usr/lib32/pkgconfig;
cd "libXinerama-1.1.6";
./configure --prefix=/usr --libdir=/usr/lib32 --host=i686-pc-linux-gnu --disable-static;
make
'''
package = '''
cd "libXinerama-1.1.6";
make DESTDIR="$pkgdir" install;
rm -rf "$pkgdir/usr/include" "$pkgdir/usr/share" "$pkgdir/usr/bin"
'''
