[package]
name     = "libxxf86vm"
version  = "1.1.7"
release  = 1
summary  = "X11 XFree86 video mode extension library (Mesa GLX)"
homepage = "https://xorg.freedesktop.org/"
license  = ["custom"]
arch     = ["x86_64"]

depends     = ["glibc", "libx11", "libxext"]
makedepends = ["xorgproto", "pkgconf"]
options     = ["!lto"]

[[source]]
url    = "https://www.x.org/pub/individual/lib/libXxf86vm-1.1.7.tar.xz"
sha256 = "ae50c0f669e0af5a67cc4cd0f54f21d64a64d2660af883e80e95d3fe51b945d8"

[steps]
build = '''
cd "libXxf86vm-$version";
./configure --prefix=/usr --libdir=/usr/lib --disable-static;
make
'''
package = '''
cd "libXxf86vm-$version";
make DESTDIR="$pkgdir" install
'''
