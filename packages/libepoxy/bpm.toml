[package]
name     = "libepoxy"
version  = "1.5.10"
release  = 1
summary  = "OpenGL function pointer management library"
homepage = "https://www.freedesktop.org/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["mesa", "libglvnd"]
makedepends = ["meson", "ninja", "pkgconf", "python", "xorgproto"]
options     = ["!lto"]

[[source]]
url    = "https://github.com/anholt/libepoxy/archive/1.5.10/libepoxy-1.5.10.tar.gz"
sha256 = "a7ced37f4102b745ac86d6a70a9da399cc139ff168ba6b8002b4d8d43c900c15"

[steps]
build = '''
function arch-meson () 
{ 
    meson setup "$@"
};
meson setup libepoxy-1.5.10 build --prefix=/usr --buildtype=release -Dwerror=false -Dtests=false;
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
