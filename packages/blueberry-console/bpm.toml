[package]
name     = "blueberry-console"
version  = "0.8.0"
release  = 1
summary  = "First-party web console to manage a Blueberry box (HTTPS, PAM auth)"
homepage = "https://github.com/zsigisti/blueberry"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

# Privileged API daemon (wraps systemctl/bpm/proc) + a static SPA. Serves HTTPS
# natively (rustls; self-signed cert auto-generated via openssl on first run) and
# authenticates system users via PAM (like Proxmox). [[containers-podman]]
depends     = ["glibc", "gcc-libs", "systemd", "pam", "openssl"]
makedepends = ["rust", "pam", "clang"]
options     = ["!lto"]

[steps]
build = '''
rm -rf bbcsrc
cp -r "$startdir/../../src/bbconsole" bbcsrc
cd bbcsrc
export CARGO_HOME="$srcdir/cargo"
cargo build --release --locked 2>/dev/null || cargo build --release
'''
package = '''
cd bbcsrc
install -Dm755 target/release/bbconsole "$pkgdir/usr/bin/bbconsole"
# Static frontend.
for f in web/*; do install -Dm644 "$f" "$pkgdir/usr/share/blueberry-console/$f"; done
# PAM service used by the console to authenticate system users (checks /etc/shadow
# via pam_unix; swap in an @include of the system stack for faillock/etc).
install -Dm644 /dev/stdin "$pkgdir/etc/pam.d/blueberry-console" <<'EOF'
auth     required pam_unix.so
account  required pam_unix.so
EOF

# Daemon config (read by the unit via EnvironmentFile). Ships LAN-accessible.
install -Dm644 /dev/stdin "$pkgdir/etc/default/blueberry-console" <<'EOF'
# Blueberry Console configuration.
#
# The console serves HTTPS natively (rustls). On first start it generates a
# self-signed cert at /etc/blueberry/console/{cert,key}.pem — browsers will warn
# about it; drop a real cert/key at those paths to replace it.
#
# BBCONSOLE_BIND — address:port to listen on (HTTPS).
#   0.0.0.0:9090    reachable from the LAN  (current setting)
#   127.0.0.1:9090  localhost only (reach via SSH tunnel)
BBCONSOLE_BIND=0.0.0.0:9090

# Only root + members of this group may log in.
BBCONSOLE_ADMIN_GROUP=wheel

# TLS material (defaults shown; point at a real cert to avoid the browser warning).
#BBCONSOLE_CERT=/etc/blueberry/console/cert.pem
#BBCONSOLE_KEY=/etc/blueberry/console/key.pem
EOF

# Optional: front it with nginx on :443 (e.g. for a real cert / vhost routing).
# The daemon already does TLS, so nginx proxies HTTPS→HTTPS to 127.0.0.1:9090.
install -Dm644 /dev/stdin "$pkgdir/usr/share/blueberry-console/nginx-console.conf" <<'EOF'
server {
    listen 443 ssl;
    server_name _;
    ssl_certificate     /etc/ssl/certs/console.crt;
    ssl_certificate_key /etc/ssl/private/console.key;
    location / {
        proxy_pass https://127.0.0.1:9090;
        proxy_ssl_verify off;               # daemon uses a self-signed cert
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}
EOF
# systemd unit (opt-in enable).
install -Dm644 /dev/stdin "$pkgdir/usr/lib/systemd/system/blueberry-console.service" <<'EOF'
[Unit]
Description=Blueberry management console
Documentation=https://github.com/zsigisti/blueberry
After=network.target

[Service]
# Privileged by design (manages services/packages) → runs as root. The bind
# address comes from /etc/default/blueberry-console (BBCONSOLE_BIND).
EnvironmentFile=-/etc/default/blueberry-console
ExecStart=/usr/bin/bbconsole
Restart=on-failure
# Modest hardening (must keep the ability to drive systemctl/bpm). systemd
# creates these BEFORE setting up the mount namespace and adds them to the
# read-write set, so ProtectHome can't trip over a missing path on first start:
#   ConfigurationDirectory → /etc/blueberry/console  (TLS cert/key, token)
#   LogsDirectory          → /var/log/blueberry-console  (audit log)
NoNewPrivileges=no
ProtectHome=yes
ConfigurationDirectory=blueberry/console
LogsDirectory=blueberry-console

[Install]
WantedBy=multi-user.target
EOF
'''
