[package]
name     = "networkmanager-qt"
version  = "6.27.0"
release  = 1
summary  = "KDE: Qt wrapper for NetworkManager"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "networkmanager"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "networkmanager"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/networkmanager-qt-6.27.0.tar.xz"
sha256 = "a8193895b420d576fac228388ba8fd1b24d6f229c43b7963e2ed581ef82cad9a"

[steps]
build = '''
cmake -S "networkmanager-qt-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
