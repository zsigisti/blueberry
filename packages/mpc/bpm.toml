[package]
name     = "mpc"
version  = "1.3.1"
release  = 2
summary  = "Library for complex-number arithmetic with arbitrary precision (libmpc)"
homepage = "https://www.multiprecision.org/mpc/"
license  = ["LGPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["mpfr", "gmp"]
provides    = ["libmpc.so"]

# 1.3.1 is the latest GNU mpc release (the freshness checker mis-reads a bogus
# "1.4.1"); mpc is a gcc build-dep and is bumped together with the toolchain.
[upstream]
skip   = true
reason = "latest is 1.3.1; gcc toolchain build-dep, bump with gcc/gmp/mpfr"

[[source]]
url    = "https://ftp.gnu.org/gnu/mpc/mpc-1.3.1.tar.gz"
sha256 = "ab642492f5cf882b74aa0cb730cd410a81edcdbec895183ce930e706c1c759b8"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install
'''
