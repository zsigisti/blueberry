[package]
name     = "tree"
version  = "2.3.2"
release  = 1
summary  = "A directory listing program displaying a depth-indented list of files"
homepage = "https://gitlab.com/OldManProgrammer/unix-tree"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends = ["glibc"]

[[source]]
url    = "https://github.com/Old-Man-Programmer/tree/archive/2.3.2/tree-2.3.2.tar.gz"
sha256 = "22cf32e84e3eb508d97a9e991c2c3cc006b9dcf4afed201d96311c5c57d08fcf"

[steps]
build = '''
cd "$name-$version";
make CFLAGS="${CFLAGS:-} -std=c11"
'''
package = '''
cd "$name-$version";
# tree's Makefile repurposes DESTDIR as the bindir and has no staging prefix,
# so point DESTDIR/MANDIR straight into $pkgdir (TREE_DEST=tree is the binary).
make DESTDIR="$pkgdir/usr/bin" MANDIR="$pkgdir/usr/share/man" install;
install -Dm644 LICENSE "$pkgdir/usr/share/licenses/$name/LICENSE"
'''
