[package]
name     = "zint"
version  = "2.16.0"
release  = 1
summary  = "Barcode encoding library (libzint)"
homepage = "https://www.zint.org.uk/"
license  = ["GPL-3.0-or-later", "BSD-3-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs", "libpng", "zlib"]
makedepends = ["cmake", "ninja", "libpng", "zlib"]
provides    = ["libzint.so"]

[[source]]
url    = "https://github.com/zint/zint/archive/2.16.0/zint-2.16.0.tar.gz"
sha256 = "e1077fd5846bdd0128fef3ab8c3c28e93e450d2efaf1424d0aa96e0c9e514591"

[steps]
build = '''
cmake -B build -S "$name-$version" -G Ninja \
  -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DZINT_USE_QT=OFF
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
