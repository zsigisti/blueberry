[package]
name     = "libjxl"
version  = "0.11.2"
release  = 1
summary  = "JPEG XL reference codec (libjxl)"
homepage = "https://github.com/libjxl/libjxl"
license  = ["BSD-3-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs", "highway", "brotli", "lcms2"]
makedepends = ["cmake", "ninja", "highway", "brotli", "lcms2"]
provides    = ["libjxl.so", "libjxl_cms.so", "libjxl_threads.so"]

[[source]]
url    = "https://github.com/libjxl/libjxl/archive/v0.11.2/libjxl-0.11.2.tar.gz"
sha256 = "ab38928f7f6248e2a98cc184956021acb927b16a0dee71b4d260dc040a4320ea"

[steps]
build = '''
cmake -B build -S "$name-$version" -G Ninja \
  -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
  -DBUILD_TESTING=OFF -DJPEGXL_ENABLE_PLUGINS=OFF \
  -DJPEGXL_ENABLE_BENCHMARK=OFF -DJPEGXL_ENABLE_EXAMPLES=OFF \
  -DJPEGXL_ENABLE_DOXYGEN=OFF -DJPEGXL_ENABLE_MANPAGES=OFF \
  -DJPEGXL_ENABLE_SKCMS=OFF -DJPEGXL_ENABLE_TOOLS=OFF \
  -DJPEGXL_ENABLE_JPEGLI=OFF -DJPEGXL_ENABLE_OPENEXR=OFF \
  -DJPEGXL_ENABLE_SJPEG=OFF -DJPEGXL_ENABLE_TRANSCODE_JPEG=OFF \
  -DJPEGXL_FORCE_SYSTEM_HWY=ON -DJPEGXL_FORCE_SYSTEM_BROTLI=ON \
  -DJPEGXL_FORCE_SYSTEM_LCMS2=ON
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
