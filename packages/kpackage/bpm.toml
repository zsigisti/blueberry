[package]
name     = "kpackage"
version  = "6.27.0"
release  = 1
summary  = "KDE: installing and loading content packages"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "karchive", "kconfig", "kcoreaddons", "ki18n"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/kpackage-6.27.0.tar.xz"
sha256 = "5fa4b07f729c3ff6b7f362d318374810fa55b13a922d2b240462eb8efc1045e8"

[steps]
build = '''
cmake -S "kpackage-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
