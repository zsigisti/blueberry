[package]
name     = "plasma-workspace"
version  = "6.7.0"
release  = 1
summary  = "KDE: the Plasma workspace — panels, shell, krunner, notifications"
homepage = "https://kde.org/plasma-desktop/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["accountsservice", "appstream", "dbus", "fontconfig", "freetype2", "icu", "kactivitymanagerd", "karchive", "kauth", "kbookmarks", "kcmutils", "kcolorscheme", "kcompletion", "kconfig", "kconfigwidgets", "kcoreaddons", "kcrash", "kde-cli-tools", "kdeclarative", "kded", "kdbusaddons", "kglobalaccel", "kguiaddons", "kholidays", "ki18n", "kiconthemes", "kidletime", "kio", "kirigami", "kirigami-addons", "kitemmodels", "kjobwidgets", "knewstuff", "knighttime", "knotifications", "kpackage", "kparts", "kpipewire", "krunner", "kquickcharts", "kscreenlocker", "kservice", "kstatusnotifieritem", "ksvg", "ksystemstats", "ktexteditor", "ktextwidgets", "kuserfeedback", "kwallet", "kwayland", "kwidgetsaddons", "kwin", "kwindowsystem", "kxmlgui", "layer-shell-qt", "libcanberra", "libice", "libksysguard", "libplasma", "libsm", "libx11", "libxau", "libxcb", "libxcursor", "libxfixes", "libxft", "libxtst", "milou", "ocean-sound-theme", "plasma-activities", "plasma-activities-stats", "plasma5support", "prison", "qt6-5compat", "qt6-base", "qt6-declarative", "qt6-positioning", "qt6-svg", "solid", "wayland", "xcb-util", "xcb-util-cursor", "xcb-util-image", "xcb-util-wm", "xorg-xwayland", "zlib", "plasma-integration", "qcoro"]
makedepends = ["qcoro", "kdoctools", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools", "qt6-wayland", "wayland-protocols", "plasma-wayland-protocols"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/plasma/6.7.0/plasma-workspace-6.7.0.tar.xz"
sha256 = "9a7f2a04e8a44bf24da4d294bba270984a090ef17a082cd1eb25cb8182651d3c"

[steps]
build = '''
cmake -S "plasma-workspace-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_LIBEXECDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
