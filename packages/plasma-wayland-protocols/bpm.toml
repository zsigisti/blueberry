[package]
name     = "plasma-wayland-protocols"
version  = "1.21.0"
release  = 1
summary  = "Plasma-specific Wayland protocol XML definitions (KWin, kwindowsystem)"
homepage = "https://invent.kde.org/libraries/plasma-wayland-protocols"
license  = ["LGPL-2.1-or-later"]
arch     = ["any"]

makedepends = ["extra-cmake-modules", "cmake", "ninja"]

[[source]]
url    = "https://download.kde.org/stable/plasma-wayland-protocols/plasma-wayland-protocols-1.21.0.tar.xz"
sha256 = "698a7b28b711270314e396e248ae86087cfeaed01372009063995be6e1dc85ba"

[steps]
build = '''
cmake -S "plasma-wayland-protocols-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D BUILD_TESTING=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
