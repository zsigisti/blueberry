[package]
name     = "kwallet"
version  = "6.27.0"
release  = 1
summary  = "KDE: secure storage of passwords"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "kcodecs", "kconfig", "kconfigwidgets", "kcoreaddons", "kdbusaddons", "ki18n", "kwidgetsaddons", "kwindowsystem", "libgcrypt", "gpgme"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "libgcrypt", "gpgme"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/kwallet-6.27.0.tar.xz"
sha256 = "daa03acc40eec873bb450fd8116ae7c788b86a7ceebc9fa555b4a166feeb7983"

[steps]
build = '''
cmake -S "kwallet-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
