[package]
name     = "libusb"
version  = "1.0.30"
release  = 1
summary  = "Library to enable user space application programs to communicate with USB devices"
homepage = "https://libusb.info/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]
provides    = ["libusb-1.0.so"]

[[source]]
url    = "https://github.com/libusb/libusb/releases/download/v1.0.30/libusb-1.0.30.tar.bz2"
sha256 = "fea36f34f9156400209595e300840767ab1a385ede1dc7ee893015aea9c6dbaf"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --disable-static --disable-udev;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install
'''
