[package]
name     = "at-spi2-core"
version  = "2.60.4"
release  = 1
summary  = "Assistive Technology Service Provider Interface (AT-SPI / libatspi — Qt6 a11y bridge)"
homepage = "https://gitlab.gnome.org/GNOME/at-spi2-core"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "glib2", "dbus", "libx11", "libxml2", "libxtst", "libxi"]
makedepends = ["meson", "ninja", "pkgconf", "glib2-devel"]
options     = ["!lto"]

[[source]]
url    = "https://download.gnome.org/sources/at-spi2-core/2.60/at-spi2-core-2.60.4.tar.xz"
sha256 = "1a1f5ba9805917f41fc6aa6823dcf887a291d607a427e2d5afb6b5dfa65070c7"

[steps]
build = '''
meson setup "at-spi2-core-$version" build --prefix=/usr --libdir=/usr/lib --buildtype=release -Dintrospection=disabled -Ddocs=false -Dx11=enabled;
ninja -C build
'''
package = '''
DESTDIR="$pkgdir" ninja -C build install
'''
