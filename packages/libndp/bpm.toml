[package]
name     = "libndp"
version  = "1.9"
release  = 1
summary  = "Library for IPv6 Neighbor Discovery Protocol"
homepage = "https://github.com/jpirko/libndp"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["autoconf", "automake", "libtool", "pkgconf"]
provides    = ["libndp.so"]

[[source]]
url    = "https://github.com/jpirko/libndp/archive/v1.9/libndp-1.9.tar.gz"
sha256 = "e564f5914a6b1b799c3afa64c258824a801c1b79a29e2fe6525b682249c65261"

[steps]
build = '''
cd "$name-$version"
./autogen.sh
./configure --prefix=/usr --disable-static
make
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
'''
