[package]
name     = "fuse-overlayfs"
version  = "1.17"
release  = 1
summary  = "FUSE implementation of overlayfs for rootless container storage"
homepage = "https://github.com/containers/fuse-overlayfs"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "fuse3"]
makedepends = ["autoconf", "automake", "make", "pkgconf", "fuse3"]

[[source]]
url    = "https://github.com/containers/fuse-overlayfs/archive/v1.17/fuse-overlayfs-1.17.tar.gz"
sha256 = "cefffecfbb001b2784f19af344f27eae07b31a4faa38d345b738af96b2bec59e"

[steps]
build = '''
cd "fuse-overlayfs-$version"
./autogen.sh
./configure --prefix=/usr
make
'''
package = '''
cd "fuse-overlayfs-$version"
make install DESTDIR="$pkgdir"
'''
