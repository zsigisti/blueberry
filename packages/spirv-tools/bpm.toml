[package]
name     = "spirv-tools"
version  = "1.4.350.1"
release  = 1
summary  = "API and tools for processing SPIR-V modules (Mesa Gallium)"
homepage = "https://github.com/KhronosGroup/SPIRV-Tools"
license  = ["Apache-2.0"]
arch     = ["x86_64"]

depends     = ["gcc-libs", "glibc"]
makedepends = ["cmake", "ninja", "python"]
options     = ["!lto"]

[[source]]
url    = "spirv-tools-1.4.350.1.tar.gz::https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/vulkan-sdk-1.4.350.1.tar.gz"
sha256 = "6f7b9b9eed9a7aa485918466ea604b4edc7969d94e96c0c13ae266f4ec120f31"

[[source]]
url    = "spirv-headers-1.4.350.1.tar.gz::https://github.com/KhronosGroup/SPIRV-Headers/archive/refs/tags/vulkan-sdk-1.4.350.1.tar.gz"
sha256 = "9e6d5c78878172d2b810e97f3a74ecbbb14b4ad52b07384ce915fbbeb226d610"

[steps]
build = '''
cmake -S "SPIRV-Tools-vulkan-sdk-$version" -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBDIR=lib -DSPIRV-Headers_SOURCE_DIR="$PWD/SPIRV-Headers-vulkan-sdk-$version" -DSPIRV_TOOLS_BUILD_STATIC=OFF -DBUILD_SHARED_LIBS=ON -DSPIRV_SKIP_TESTS=ON -DSPIRV_SKIP_EXECUTABLES=OFF -DSPIRV_WERROR=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
