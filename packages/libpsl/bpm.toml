[package]
name     = "libpsl"
version  = "0.23.0"
release  = 1
summary  = "Public Suffix List library"
homepage = "https://rockdaboot.github.io/libpsl/"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["glibc", "libidn2", "libunistring"]
makedepends = ["meson", "ninja", "pkgconf", "libidn2", "libunistring", "python"]
provides    = ["libpsl.so"]

[[source]]
url    = "https://github.com/rockdaboot/libpsl/releases/download/0.23.0/libpsl-0.23.0.tar.gz"
sha256 = "f39b9631b3d369a21259ea4654f8875c0ec6995ce9551c0eb5d423e4c011f911"

[steps]
build = '''
arch-meson "$name-$version" build -D runtime=libidn2 -D builtin=true
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
