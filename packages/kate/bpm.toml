[package]
name     = "kate"
version  = "26.04.2"
release  = 1
summary  = "KDE: the Kate advanced text editor"
homepage = "https://kde.org/plasma-desktop/"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["gpgmepp", "karchive", "kbookmarks", "kcolorscheme", "kcompletion", "kconfig", "kconfigwidgets", "kcoreaddons", "kcrash", "kdbusaddons", "kguiaddons", "ki18n", "kiconthemes", "kio", "knewstuff", "kparts", "kservice", "ktexteditor", "kuserfeedback", "kwidgetsaddons", "kwindowsystem", "kxmlgui", "qt6-base", "syntax-highlighting"]
makedepends = ["extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools", "gpgmepp"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/release-service/26.04.2/src/kate-26.04.2.tar.xz"
sha256 = "f138a5b022b6ca0562b903bea7b2a794bb6bb18b88a9277ffcaf418b9b49018d"

[steps]
build = '''
cmake -S "kate-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_LIBEXECDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
