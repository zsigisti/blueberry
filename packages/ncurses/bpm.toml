[package]
name     = "ncurses"
version  = "6.6"
release  = 2
summary  = "System V Release 4.0 curses emulation library (wide-character)"
homepage = "https://invisible-island.net/ncurses/"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs"]

[[source]]
url    = "https://ftp.gnu.org/gnu/ncurses/ncurses-6.6.tar.gz"
sha256 = "355b4cbbed880b0381a04c46617b7656e362585d52e9cf84a67e2009b749ff11"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr --mandir=/usr/share/man --with-shared --without-cxx-binding --enable-widec --enable-pc-files --with-pkg-config-libdir=/usr/lib/pkgconfig --without-debug --without-ada --enable-overwrite --with-versioned-syms;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
for lib in ncurses form panel menu;
do
    ln -sf "lib${lib}w.so" "$pkgdir/usr/lib/lib${lib}.so";
done;
ln -sf libncursesw.so "$pkgdir/usr/lib/libcurses.so";
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
