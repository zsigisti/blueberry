[package]
name     = "linux"
version  = "6.18.38"
release  = 3
summary  = "The Blueberry Linux kernel (6.18 LTS, monolithic, no modules)"
homepage = "https://www.kernel.org/"
license  = ["GPL-2.0-only"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["bc", "flex", "bison", "openssl", "perl", "cpio", "xz", "pahole"]

[[source]]
url    = "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.38.tar.xz"
sha256 = "ac26e508abd56e9f8b89872b6e10c49fc823bcc70d8068a5d8504c1a7c4ff045"

[steps]
build = '''
cd "linux-$version";
cp "$startdir/../../src/kernel/config" .config;
make olddefconfig;
make -j"$(nproc)" bzImage
'''
# Install the kernel straight to /boot/vmlinuz — the stable path the installer's
# grub.cfg boots by root-fs UUID (src/installer/src/boot.rs). `bpm upgrade` then
# just overwrites this file (atomic rename, safe even for the running kernel) and
# the next boot picks up the new kernel; the initramfs is kernel-agnostic, so no
# grub regeneration or hook is needed. (A single pinned LTS kernel doesn't warrant
# a versioned-kernel / fallback scheme.)
package = '''
cd "linux-$version";
install -Dm644 arch/x86/boot/bzImage "$pkgdir/boot/vmlinuz"
# Also ship this build's own System.map + builtin-module metadata, keyed by the
# real kernel release (e.g. 6.18.38-blueberry). Needed to assemble the pinned boot
# artifact (tools/kernel/publish-kernel.sh) from our own container build rather
# than a host compile, and so `bpm upgrade` keeps /boot + /lib/modules in sync.
rel=$(cat include/config/kernel.release)
install -Dm644 System.map "$pkgdir/boot/System.map-$rel"
install -Dm644 modules.builtin "$pkgdir/lib/modules/$rel/modules.builtin"
install -Dm644 modules.builtin.modinfo "$pkgdir/lib/modules/$rel/modules.builtin.modinfo"
'''
