[package]
name     = "libgit2"
version  = "1.9.6"
release  = 1
summary  = "Portable C implementation of the Git core methods (libgit2.so.1.9)"
homepage = "https://libgit2.org/"
license  = ["GPL-2.0-only-with-libgit2-exception"]
arch     = ["x86_64"]

depends     = ["glibc", "openssl", "zlib", "pcre2"]
makedepends = ["cmake", "ninja", "pkgconf", "openssl", "zlib", "pcre2", "python"]
provides    = ["libgit2.so"]

[[source]]
url    = "https://github.com/libgit2/libgit2/archive/refs/tags/v1.9.6.tar.gz"
sha256 = "a88a42a4ea9bdab7aa8686eead3bf7d9c6dd74529caca16ab22eaa92433d31d9"

[steps]
build = '''
cd "libgit2-$version"
# No SSH (avoids libssh2), HTTPS via OpenSSL, regex via the packaged pcre2 — so
# the only runtime deps are openssl/zlib/pcre2. This is what cargo links.
cmake -S . -B build -G Ninja \
    -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DBUILD_TESTS=OFF -DUSE_SSH=OFF -DUSE_HTTPS=OpenSSL -DREGEX_BACKEND=pcre2 \
    -DUSE_BUNDLED_ZLIB=OFF
ninja -C build
'''
package = '''
cd "libgit2-$version"
DESTDIR="$pkgdir" ninja -C build install
'''
