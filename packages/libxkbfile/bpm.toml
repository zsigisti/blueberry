[package]
name = "libxkbfile"
version = "1.1.3"
release = 1
summary = "X11 keyboard file manipulation library"
homepage = "https://xorg.freedesktop.org/"
license = ["MIT"]
arch = ["x86_64"]
depends = ["glibc", "libx11"]
makedepends = ["xorgproto", "xtrans", "pkgconf"]
provides = ["libxkbfile.so"]
[[source]]
url = "https://www.x.org/releases/individual/lib/libxkbfile-1.1.3.tar.xz"
sha256 = "SKIP"
[steps]
build = '''
cd "libxkbfile-$version";
./configure --prefix=/usr --disable-static;
make
'''
package = '''
cd "libxkbfile-$version";
make DESTDIR="$pkgdir" install
'''
