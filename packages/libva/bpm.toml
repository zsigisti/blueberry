[package]
name     = "libva"
version  = "2.22.0"
release  = 1
summary  = "VA-API — video acceleration hardware abstraction"
homepage = "https://github.com/intel/libva"
license  = ["MIT"]
arch     = ["x86_64"]

depends     = ["glibc", "libdrm", "libx11", "libxext", "libxfixes", "wayland"]
makedepends = ["meson", "ninja", "pkgconf", "libdrm", "libx11", "libxext", "libxfixes", "wayland", "wayland-protocols"]
provides    = ["libva.so", "libva-drm.so", "libva-x11.so", "libva-wayland.so", "libva-glx.so"]

[[source]]
url    = "https://github.com/intel/libva/releases/download/2.22.0/libva-2.22.0.tar.bz2"
sha256 = "e3da2250654c8d52b3f59f8cb3f3d8e7fb1a2ee64378dbc400fbc5663de7edb8"

[steps]
build = '''
arch-meson "$name-$version" build -D disable_drm=false -D with_x11=yes -D with_wayland=yes
meson compile -C build
'''
package = '''
meson install -C build --destdir "$pkgdir"
'''
