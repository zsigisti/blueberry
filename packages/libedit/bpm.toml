[package]
name     = "libedit"
version  = "20240808_3.1"
release  = 1
summary  = "BSD command-line editing library (readline replacement)"
homepage = "https://thrysoee.dk/editline/"
license  = ["BSD-3-Clause"]
arch     = ["x86_64"]

depends     = ["glibc", "ncurses"]

[[source]]
url    = "https://thrysoee.dk/editline/libedit-20240808-3.1.tar.gz"
sha256 = "5f0573349d77c4a48967191cdd6634dd7aa5f6398c6a57fe037cc02696d6099f"

[steps]
build = '''
cd "libedit-$_distver";
./configure --prefix=/usr --disable-static;
make
'''
package = '''
cd "libedit-$_distver";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
