[package]
name     = "python-markupsafe"
version  = "3.0.3"
release  = 1
summary  = "Safe string handling for Python (Jinja dependency)"
homepage = "https://palletsprojects.com/p/markupsafe/"
license  = ["BSD-3-Clause"]
arch     = ["any"]

depends     = ["python"]

# Install the pure-Python package (the C _speedups extension is an optional
# accelerator; markupsafe falls back to _native.py without it) — no pip/build
# backend needed.
[[source]]
url    = "https://files.pythonhosted.org/packages/7e/99/7690b6d4034fffd95959cbe0c02de8deb3098cc577c67bb6a24fe5d7caa7/markupsafe-3.0.3.tar.gz"
sha256 = "722695808f4b6457b320fdc131280796bdceb04ab50fe1795cd540799ebe1698"

[steps]
package = '''
cd "markupsafe-$version";
pyver=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')");
site="$pkgdir/usr/lib/python$pyver/site-packages";
install -d "$site";
cp -r src/markupsafe "$site/";
rm -f "$site/markupsafe/_speedups.c"
'''
