[package]
name     = "which"
version  = "2.25"
release  = 1
summary  = "Shows the full path of (shell) commands"
homepage = "https://savannah.gnu.org/projects/which/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]

depends     = ["glibc"]

[[source]]
url    = "https://ftp.gnu.org/gnu/which/which-2.25.tar.gz"
sha256 = "1cb83e4f702e60b8211ab5ec4c2afbab1b1dec80209456a7d2faf7584ed225ea"

[steps]
build = '''
cd "$name-$version";
./configure --prefix=/usr;
make
'''
package = '''
cd "$name-$version";
make DESTDIR="$pkgdir" install;
install -Dm644 COPYING "$pkgdir/usr/share/licenses/$name/COPYING"
'''
