[package]
name     = "libplist"
version  = "2.7.0"
release  = 1
summary  = "Apple property list library"
homepage = "https://blueberry.linux/"
license  = ["custom"]
arch     = ["x86_64"]

depends     = ["glibc"]
options     = ["!lto"]

[[source]]
url    = "libplist-2.7.0.tar.bz2::https://github.com/libimobiledevice/libplist/releases/download/2.7.0/libplist-2.7.0.tar.bz2"
sha256 = "7ac42301e896b1ebe3c654634780c82baa7cb70df8554e683ff89f7c2643eb8b"

[steps]
build = '''
cd "libplist-2.7.0";
./configure --prefix=/usr --libdir=/usr/lib --without-cython;
make
'''
package = '''
cd "libplist-2.7.0";
make DESTDIR="$pkgdir" install
'''
