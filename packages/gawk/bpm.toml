[package]
name     = "gawk"
version  = "5.4.1"
release  = 1
summary  = "GNU gawk — core CLI tool (desktop base; busybox covers the server)"
homepage = "https://www.gnu.org/software/gawk/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]
depends     = ["glibc", "mpfr", "gmp", "readline"]
makedepends = ["gcc", "make", "pkgconf", "mpfr", "gmp", "readline"]
options     = ["!lto"]

[[source]]
url    = "https://ftp.gnu.org/gnu/gawk/gawk-5.4.1.tar.xz"
sha256 = "07f6f7342b7febe4313fc2c2542ad93d64fe20ad8717200109f105a826f5fd37"

[steps]
build = '''
cd "gawk-$version"
export CFLAGS="-O2 -std=gnu17"
./configure --prefix=/usr
make
'''
package = '''
cd "gawk-$version"
make DESTDIR="$pkgdir" install
'''
