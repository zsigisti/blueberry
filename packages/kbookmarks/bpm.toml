[package]
name     = "kbookmarks"
version  = "6.27.0"
release  = 1
summary  = "KDE: bookmark management (XBEL)"
homepage = "https://community.kde.org/Frameworks"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["qt6-base", "kcodecs", "kconfig", "kconfigwidgets", "kcoreaddons", "kwidgetsaddons", "kxmlgui", "kiconthemes"]
makedepends = ["qt6-tools", "qt6-declarative", "extra-cmake-modules", "cmake", "ninja", "python", "qt6-base"]
options     = ["!lto"]

[[source]]
url    = "https://download.kde.org/stable/frameworks/6.27/kbookmarks-6.27.0.tar.xz"
sha256 = "75a43775ef03cb0c577c70d9605203789b3c75b786efa17a2e8c286d0c55fb93"

[steps]
build = '''
cmake -S "kbookmarks-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D KDE_INSTALL_LIBDIR=lib -D KDE_INSTALL_USE_QT_SYS_PATHS=ON -D BUILD_TESTING=OFF -D BUILD_QCH=OFF -D BUILD_PYTHON_BINDINGS=OFF;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
