[package]
name="assimp"
version="6.0.5"
release=1
summary="Open Asset Import Library — 3D model import (libassimp)"
homepage="https://www.assimp.org/"
license=["BSD-3-Clause"]
arch=["x86_64"]
depends=["glibc","gcc-libs","zlib"]
makedepends=["cmake","ninja","zlib"]
provides=["libassimp.so"]
[[source]]
url="https://github.com/assimp/assimp/archive/v6.0.5/assimp-6.0.5.tar.gz"
sha256="edf3749559c2b7d1f758ffb66fc5bec62186221e623b7f2e8969f17ee46ecb6f"
[steps]
build='''
cmake -B build -S "$name-$version" -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
  -DBUILD_SHARED_LIBS=ON -DASSIMP_BUILD_TESTS=OFF -DASSIMP_BUILD_ASSIMP_TOOLS=OFF \
  -DASSIMP_INSTALL_PDB=OFF -DASSIMP_BUILD_ZLIB=OFF -DASSIMP_WARNINGS_AS_ERRORS=OFF
cmake --build build
'''
package='''
DESTDIR="$pkgdir" cmake --install build
'''
