[package]
name     = "sddm"
version  = "0.21.0"
release  = 1
summary  = "Simple Desktop Display Manager — the Qt-based login screen (Blueberry Desktop default)"
homepage = "https://github.com/sddm/sddm"
license  = ["GPL-2.0-or-later"]
arch     = ["x86_64"]

depends     = ["bash", "glibc", "libxau", "libxcb", "pam", "qt6-base", "qt6-declarative", "systemd", "xorg-xauth"]
makedepends = ["extra-cmake-modules", "cmake", "ninja", "python", "qt6-base", "qt6-declarative", "qt6-tools", "pam", "python-docutils"]

[[source]]
url    = "https://github.com/sddm/sddm/archive/v0.21.0/sddm-0.21.0.tar.gz"
sha256 = "f895de2683627e969e4849dbfbbb2b500787481ca5ba0de6d6dfdae5f1549abf"

[steps]
build = '''
cmake -S "sddm-$version" -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr -D CMAKE_POLICY_VERSION_MINIMUM=3.5 -D BUILD_WITH_QT6=ON -D BUILD_MAN_PAGES=ON -D ENABLE_JOURNALD=ON -D DBUS_CONFIG_DIR=/usr/share/dbus-1/system.d -D RUNTIME_DIR=/run/sddm -D SYSTEMD_SYSTEM_UNIT_DIR=/usr/lib/systemd/system -D SYSTEMD_SYSUSERS_DIR=/usr/lib/sysusers.d -D SYSTEMD_TMPFILES_DIR=/usr/lib/tmpfiles.d;
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build;
install -d "$pkgdir/usr/lib/sddm/sddm.conf.d";
cat > "$pkgdir/usr/lib/sddm/sddm.conf.d/default.conf" <<'EOF'
[Theme]
Current=breeze

[General]
GreeterEnvironment=QT_WAYLAND_SHELL_INTEGRATION=layer-shell
EOF
'''
