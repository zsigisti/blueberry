[package]
name     = "libassuan"
version  = "3.0.1"
release  = 1
summary  = "IPC library used by GnuPG and related software"
homepage = "https://gnupg.org/software/libassuan/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]

depends     = ["glibc", "libgpg-error"]
makedepends = ["make", "gcc", "libgpg-error"]
provides    = ["libassuan.so"]

[[source]]
url    = "https://www.gnupg.org/ftp/gcrypt/libassuan/libassuan-3.0.1.tar.bz2"
sha256 = "c8f0f42e6103dea4b1a6a483cb556654e97302c7465308f58363778f95f194b1"

[steps]
build = '''
cd "$name-$version"
./configure --prefix=/usr --disable-static
make -j"$(nproc)"
'''
package = '''
cd "$name-$version"
make DESTDIR="$pkgdir" install
install -Dm644 COPYING.LIB "$pkgdir/usr/share/licenses/$name/COPYING.LIB"
'''
