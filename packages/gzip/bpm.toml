[package]
name     = "gzip"
version  = "1.14"
release  = 1
summary  = "GNU gzip — core CLI tool (desktop base; busybox covers the server)"
homepage = "https://www.gnu.org/software/gzip/"
license  = ["GPL-3.0-or-later"]
arch     = ["x86_64"]
depends     = ["glibc"]
makedepends = ["gcc", "make", "pkgconf"]
options     = ["!lto"]

[[source]]
url    = "https://ftp.gnu.org/gnu/gzip/gzip-1.14.tar.xz"
sha256 = "01a7b881bd220bfdf615f97b8718f80bdfd3f6add385b993dcf6efd14e8c0ac6"

[steps]
build = '''
cd "gzip-$version"
export CFLAGS="-O2 -std=gnu17"
./configure --prefix=/usr
make
'''
package = '''
cd "gzip-$version"
make DESTDIR="$pkgdir" install
'''
