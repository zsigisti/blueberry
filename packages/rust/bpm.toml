[package]
name     = "rust"
version  = "1.97.0"
release  = 2
summary  = "The Rust compiler and Cargo package manager"
homepage = "https://www.rust-lang.org/"
license  = ["Apache-2.0", "MIT"]
arch     = ["x86_64"]

depends     = ["glibc", "gcc-libs", "llvm", "libgit2", "curl"]
provides    = ["cargo"]
# Bootstrapped from upstream's PINNED stage0 compiler, which x.py downloads per
# the source's src/stage0 (a throwaway build seed — you cannot compile a compiler
# without a prior one; it is never shipped). stage2 is then compiled from source
# against OUR llvm (llvm-config below, link-shared) so the final rustc is produced
# by Blueberry's own toolchain and links our libLLVM — no Arch rust involved.
# Deliberately NOT bootstrapped from the container's Arch rustc: it is ABI-bound
# to Arch's libLLVM, which our llvm shadows, breaking the bootstrap.
# Needs cmake/ninja for the LLVM C++ glue, python + curl for the build system and
# the stage0 download.
makedepends = ["llvm", "clang", "cmake", "ninja", "python", "curl", "gcc", "make", "pkgconf", "libffi", "zlib"]

[[source]]
url    = "https://static.rust-lang.org/dist/rustc-1.97.0-src.tar.xz"
sha256 = "de002ee301c1b7422b0a7b09d7c4cb4924cd3224e6cfb24f065dad786dd3ed12"

[steps]
build = '''
cd "rustc-$version-src";
./configure \
    --prefix=/usr --sysconfdir=/etc \
    --release-channel=stable \
    --enable-extended --tools=cargo \
    --disable-docs \
    --set rust.channel=stable \
    --set llvm.link-shared=true \
    --set target.x86_64-unknown-linux-gnu.llvm-config=/usr/bin/llvm-config;
python3 x.py build --stage 2
'''
package = '''
cd "rustc-$version-src";
DESTDIR="$pkgdir" python3 x.py install;
rm -f "$pkgdir/usr/lib/rustlib/"{install.log,manifest-*,components,rust-installer-version,uninstall.sh}
'''
