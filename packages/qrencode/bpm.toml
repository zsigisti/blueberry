[package]
name     = "qrencode"
version  = "4.1.1"
release  = 1
summary  = "QR Code encoding library — libqrencode.so.4 (Plasma clipboard/klipper)"
homepage = "https://fukuchi.org/works/qrencode/"
license  = ["LGPL-2.1-or-later"]
arch     = ["x86_64"]
depends     = ["glibc"]
makedepends = ["gcc", "cmake", "ninja", "pkgconf"]
options     = ["!lto"]
[[source]]
url    = "https://github.com/fukuchi/libqrencode/archive/refs/tags/v4.1.1.tar.gz"
sha256 = "5385bc1b8c2f20f3b91d258bf8ccc8cf62023935df2d2676b5b67049f31a049c"
[steps]
build = '''
cmake -S "libqrencode-$version" -B build -G Ninja \
  -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=/usr \
  -D CMAKE_POLICY_VERSION_MINIMUM=3.5 \
  -D BUILD_SHARED_LIBS=ON -D WITH_TOOLS=NO -D WITH_TESTS=NO
cmake --build build
'''
package = '''
DESTDIR="$pkgdir" cmake --install build
'''
