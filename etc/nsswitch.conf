# /etc/nsswitch.conf — Name Service Switch configuration.
# glibc reads this to decide how to resolve users, groups, hosts, etc.
# hosts: files dns → check /etc/hosts, then DNS (/etc/resolv.conf). On a systemd
# image resolv.conf points at the systemd-resolved stub (127.0.0.53).
passwd:     files
group:      files
shadow:     files
hosts:      files dns
networks:   files
protocols:  files
services:   files
ethers:     files
rpc:        files
netgroup:   files
