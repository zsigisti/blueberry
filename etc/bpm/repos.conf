# bpm repositories — one line per repo: "<name> <url> [mirror2 mirror3 ...]"
# (blank lines and #comments ignored).
#
# Each url serves a `bpm.index` (built by tools/pkg/bpmrepo.sh) alongside the
# .bpm packages. Both http:// and https:// work. Extra urls are MIRRORS:
# `bpm update` and downloads try each in turn and fail over. Nearest first.
# See tools/release/mirror/mirrorlist for the current mirror URLs.
#
# Integrity is layered: the index is fetched over TLS and its detached ed25519
# signature (bpm.index.sig) is verified against the public key baked into bpm;
# then every package download is checked against the sha256 in that index.
#
# Example with a LAN mirror:
#   core https://repo.blueberrylinux.org http://192.168.0.97

core https://repo.blueberrylinux.org
