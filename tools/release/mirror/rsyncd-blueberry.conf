# rsyncd module for the ORIGIN — exposes the bpm repo read-only so mirrors can
# pull it. Drop this into /etc/rsyncd.conf (or include it) on the origin, then
# enable the rsync daemon (e.g. `systemctl enable --now rsync`).
#
# EXPOSING IT: rsync speaks on TCP 873, which a CDN like Cloudflare does NOT
# proxy (it only fronts HTTP). So reaching this module from an off-site mirror
# means either (a) opening 873 in the firewall on a host whose real IP you're
# willing to publish (a grey-clouded DNS record such as repo-origin.<domain>),
# or (b) pulling over rsync-over-SSH with a restricted, command-forced key so no
# port is exposed. The origin currently runs `ufw` with 873 closed, so this
# module is reachable from localhost only until you make that call. Never expose
# it writable.
#
# It is a PUBLIC, READ-ONLY, ANONYMOUS module: the repo is public content and
# every byte a mirror serves is re-verified by clients (ed25519 index signature
# + per-package sha256), so no auth is needed here. Mirrors get NO write access
# and NO shell — they can only read these files.
#
# The rollback backups and temp files are excluded so mirrors never replicate
# them (they must not serve an old, validly-signed index — a downgrade vector).

uid = nobody
gid = nogroup
use chroot = yes
max connections = 50
timeout = 600

[blueberry-repo]
    path = /srv/blueberry-repo
    comment = Blueberry bpm package repository (read-only mirror source)
    read only = yes
    list = yes
    exclude = .index-backups/ *.tmp.*
