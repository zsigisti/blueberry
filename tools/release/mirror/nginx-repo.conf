# Blueberry bpm mirror — nginx vhost (canonical, version-controlled).
#
# This serves a directory of .bpm packages + the signed index over HTTP. Put TLS
# in front (Cloudflare, or your own reverse proxy / certbot). bpm verifies every
# package by SHA-256 from the ed25519-signed index, so the transport only needs
# to be authentic (TLS), not trusted to serve the right bytes.
#
# Cache policy (matters at CDN + client scale):
#   *.bpm            content-addressed by sha256 in the index → a new version is
#                    a new filename → immutable → cache forever everywhere.
#   bpm.index(.sig)  mutable + tiny → never cache → clients always revalidate, so
#                    a freshly published package is visible immediately (no more
#                    "curl -H Cache-Control: no-cache" cache-busting).
#   .index-backups/  rollback snapshots written by bpmrepo.sh → never served
#                    publicly (a stale but validly-signed index is a downgrade
#                    vector).
#
# NOTE — Cloudflare edge caching of .bpm: origin headers make browsers/clients
# and *respecting* CDNs cache .bpm forever, but Cloudflare does NOT edge-cache an
# unknown extension by default. To actually offload .bpm from the origin add ONE
# Cache Rule in the Cloudflare dashboard (Caching → Cache Rules):
#     If  URI Path ends with ".bpm"
#     Then  Eligible for cache; Edge TTL = "Use cache-control header if present".
# The index stays uncached automatically (its no-cache header is honored).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /srv/blueberry-repo;
    autoindex on;
    default_type application/octet-stream;

    location ~ \.bpm$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~ ^/bpm\.index(\.sig)?$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    location ^~ /.index-backups/ { return 404; }

    location / {
        add_header Cache-Control "no-store, max-age=0" always;
        try_files $uri $uri/ =404;
    }
}
