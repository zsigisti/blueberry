# /etc/ssh/sshd_config.d/10-blueberry.conf — Blueberry sshd defaults.
# OpenSSH's stock sshd_config ends with `Include /etc/ssh/sshd_config.d/*.conf`,
# so this drop-in overrides the shipped defaults without editing the main file.
#
# The installed system has a real root password (set by the installer); allow
# password root login so a freshly installed box is reachable. Harden as needed.
PermitRootLogin yes
PasswordAuthentication yes
UsePAM no
