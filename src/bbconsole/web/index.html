<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blueberry Console</title>
</head>
<body>
  <div id="login" hidden>
    <h1>Blueberry Console</h1>
    <p>Sign in with a system account — <code>root</code> or a member of the admin group.</p>
    <form id="login-form">
      <p><label>Username <input id="username" autocomplete="username" autocapitalize="none"></label></p>
      <p><label>Password <input id="password" type="password" autocomplete="current-password"></label></p>
      <p><button type="submit">Sign in</button></p>
      <p id="login-error" hidden></p>
    </form>
  </div>

  <div id="app" hidden>
    <h1>Blueberry Console — <span id="hostname"></span>
      <button id="logout">Sign out</button></h1>
    <nav id="nav"></nav>
    <hr>
    <main id="view"></main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
