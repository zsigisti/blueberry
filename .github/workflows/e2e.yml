# e2e.yml — the full boot/install smoke test: build the world + both ISOs, boot
# the live Server ISO to multi-user, then do an unattended install and boot the
# installed disk (`make test-e2e`). This is the gate that would have caught the
# glibc-ordering bug: nothing else actually proves the distro boots and installs.
#
# It is SLOW on GitHub runners (no KVM → QEMU runs under TCG software emulation,
# and a cold build compiles every package in the Arch container), so it runs
# nightly and on demand, never on every push. For fast, real runs point a
# self-hosted runner with /dev/kvm at this workflow. The build dir is cached so
# subsequent nightly runs only rebuild what changed.

name: e2e
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC nightly

permissions:
  contents: read

jobs:
  smoke:
    name: build + boot + install
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Install build + QEMU dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential wget xz-utils bzip2 zstd cpio bc \
            libelf-dev flex bison libssl-dev \
            qemu-system-x86 xorriso squashfs-tools podman

      - name: Cache the build tree (packages, kernel, sources)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/../blueberry-build
          key: bbuild-${{ hashFiles('packages/**/bpm.toml', 'Make.config', 'src/**') }}
          restore-keys: bbuild-

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-e2e-${{ hashFiles('src/**/Cargo.lock') }}
          restore-keys: cargo-e2e-

      - name: End-to-end smoke test (build → boot → install → boot)
        run: make test-e2e

      - name: Upload serial logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-serial-logs
          path: |
            ${{ github.workspace }}/../blueberry-build/**/*serial*.log
            /tmp/**/install-serial.log
            /tmp/**/boot-serial.log
          if-no-files-found: ignore
