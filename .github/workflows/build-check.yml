# build-check.yml — "does it build?" gate for changed recipes.
#
# On every push/PR that touches packages/, build ONLY the changed recipes from
# source (capped, heavy giants skipped) — a fast signal that a recipe edit still
# compiles. The FULL build of every package stays in build-world.yml (weekly /
# self-hosted), so we never do the whole ~400-package build per push.

name: build-check

on:
  pull_request:
    paths: ["packages/**"]
  push:
    branches: [master]
    paths: ["packages/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-changed:
    name: Build changed recipes
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine changed packages
        id: c
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          case "$base" in ""|0000000000000000000000000000000000000000) base="HEAD~1" ;; esac
          pkgs=$(tools/changed-packages.sh "$base" 12 | tr '\n' ' ')
          echo "pkgs=$pkgs" >> "$GITHUB_OUTPUT"
          echo "Changed recipes to build: ${pkgs:-<none>}"
      - name: Build them (.bpm, from source)
        if: steps.c.outputs.pkgs != ''
        run: ENGINE=docker sh tools/build-bpm-pkg.sh /tmp/bpm-out ${{ steps.c.outputs.pkgs }}
