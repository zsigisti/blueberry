# release.yml — the only CI: publish a GitHub Release when a commit lands on
# master with [RELEASE] in its message.
#
# GitHub rejects files over 100 MB in git, so the ISOs themselves live on the
# project mirror. `make release-stage` uploads them and commits a sha256
# manifest (release/isos.sha256) + notes (release/NOTES.md); this workflow
# downloads the images from the mirror, verifies them against the committed
# manifest, and attaches them to the release.
#
#   git commit -m "[RELEASE] v0.1.0-beta — first public beta"
#
# Releases are marked pre-release (beta) unless the message says [RELEASE:stable].

name: release
on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    if: contains(github.event.head_commit.message, '[RELEASE]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive tag + flags from the commit message
        id: meta
        env:
          # Pass via env, never interpolate into the script — a commit message
          # with quotes/backticks would otherwise break (or inject into) the shell.
          MSG: ${{ github.event.head_commit.message }}
        run: |
          msg="$MSG"
          subject=$(printf '%s\n' "$msg" | head -1)
          # tag = first vX… token after [RELEASE], else beta-<date>-<shortsha>
          tag=$(printf '%s\n' "$subject" | grep -oE 'v[0-9][A-Za-z0-9._-]*' | head -1)
          [ -n "$tag" ] || tag="beta-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          title=$(printf '%s\n' "$subject" | sed -E 's/\[RELEASE[^]]*\][[:space:]]*//')
          [ -n "$title" ] || title="$tag"
          case "$msg" in *"[RELEASE:stable]"*) pre=false ;; *) pre=true ;; esac
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "pre=$pre"     >> "$GITHUB_OUTPUT"

      - name: Fetch images from the mirror + verify the committed checksums
        run: |
          test -f release/isos.sha256 || { echo "release/isos.sha256 missing — run 'make release-stage' first"; exit 1; }
          mkdir -p dist && cd dist
          while read -r sum name; do
            [ -n "$name" ] || continue
            echo "fetching $name"
            curl -fL --retry 3 -o "$name" "https://repo.mmzsigmond.me/isos/$name"
          done < ../release/isos.sha256
          sha256sum -c ../release/isos.sha256

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
          MSG: ${{ github.event.head_commit.message }}
        run: |
          body=release/NOTES.md
          [ -f "$body" ] || { printf '%s\n' "$MSG" > /tmp/body.md; body=/tmp/body.md; }
          pre_flag=""
          [ "${{ steps.meta.outputs.pre }}" = "true" ] && pre_flag="--prerelease"
          gh release create "${{ steps.meta.outputs.tag }}" dist/* \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file "$body" $pre_flag
