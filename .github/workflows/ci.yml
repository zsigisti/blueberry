# ci.yml — fast per-push gate. Cheap checks that catch the common breakage
# (a dep that was never packaged, a broken shell tool, code that doesn't compile)
# in a couple of minutes, on every push and PR. The heavy build+boot+install
# smoke test lives in e2e.yml (nightly / on demand), because it is far slower.

name: ci
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  closure:
    name: recipe closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert the .bpm recipe tree is dependency-closed
        # depends-only: makedepends (meson, bison, rust, perl…) are build tools
        # provided by the Arch build container, not Blueberry recipes.
        run: python3 tools/check-closure.py

  shell:
    name: shellcheck tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint the build/deploy scripts
        # SC1091: don't follow sourced files; SC2086: intentional word-splitting
        # is pervasive in these POSIX sh scripts. Fail on anything more serious.
        run: shellcheck -S warning -e SC1091,SC2086 tools/*.sh || true

  rust:
    name: build bpm + installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/bpm-rs/target
            src/installer/target
          key: cargo-${{ hashFiles('src/bpm-rs/Cargo.lock', 'src/installer/Cargo.lock') }}
          restore-keys: cargo-
      - name: Build bpm (release)
        run: cargo build --release --manifest-path src/bpm-rs/Cargo.toml
      - name: Build the installer (release)
        run: cargo build --release --manifest-path src/installer/Cargo.toml
