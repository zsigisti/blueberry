# .github/workflows/ci.yml — build Blueberry and boot-test it in QEMU
#
# Builds the full OS (kernel + glibc runtime + busybox + runit + initramfs) and
# then boots it headless in QEMU, asserting the in-guest self-test prints
# BLUEBERRY_TEST=PASS. GitHub runners have no /dev/kvm, so qemu.sh runs under
# TCG automatically — slower, but correct.
#
# Fast static checks (shellcheck, .bpm closure, bpm/installer compile)
# live in checks.yml and gate every push without needing the full build.

name: CI

# The full world build (kernel from source + podman package builds + QEMU boot
# under TCG) is heavy and slow on free runners. checks.yml gates every push with
# the fast static checks; this integration test runs on demand, weekly, and on
# release tags — not on every commit (which just piled up red runs).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'   # Mondays 04:00 UTC
  push:
    tags: ['v*']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  OBJDIR: /tmp/blueberry-build

jobs:
  build-and-test:
    name: Build world + QEMU boot test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev \
            wget xz-utils zstd cpio \
            qemu-system-x86

      - name: Check toolchain
        run: make _check_tools

      - name: Build world
        run: make world JOBS="$(nproc)"

      - name: Boot test in QEMU
        run: make test TIMEOUT=180

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-serial-log
          path: /tmp/blueberry-test.*.log
          if-no-files-found: ignore
